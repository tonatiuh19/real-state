    post:
      tags: [Reminder Flows]
      summary: Create a new reminder flow
      security:
        - BrokerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, trigger_event]
              properties:
                name: { type: string }
                trigger_event: { type: string }
                description: { type: string }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      flow: { type: object }

  /reminder-flows/{flowId}:
    get:
      tags: [Reminder Flows]
      summary: Get a single reminder flow with full step/node data
      security:
        - BrokerAuth: []
      parameters:
        - in: path
          name: flowId
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Flow detail
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      flow: { type: object }
    put:
      tags: [Reminder Flows]
      summary: Save (overwrite) a full reminder flow including nodes/edges
      description: |
        Replaces all steps and connections for the flow.

        **Validation enforced by the server (returns 400 on failure):**
          - `step_type` must be one of: trigger, wait, send_notification,
            send_email, send_sms, send_whatsapp, condition, branch,
            wait_for_response, wait_until_date, end.
          - `edge_type` must be one of: default, condition_yes, condition_no,
            loan_type_purchase, loan_type_refinance, no_response, responded.
          - `trigger_event` (when step_type=trigger) must be one of the
            `ReminderTriggerEvent` enum values.
          - Every step must have a non-empty `label`.
          - `step_key` values must be unique within the payload.
          - `edge_key` values must be unique within the payload.
          - Every connection's `source_step_key` and `target_step_key` must
            reference a `step_key` present in the payload.
          - `position_x` / `position_y` are NaN-guarded (default 0).
          - `trigger_delay_days` is clamped to >= 0.

        Also persists `flow_category` (`loan` | `realtor_prospecting`),
        `loan_type_filter`, `realtor_role_filter`, and `is_active` when
        provided.
      security:
        - BrokerAuth: []
      parameters:
        - in: path
          name: flowId
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string }
                description: { type: string, nullable: true }
                flow_category:
                  type: string
                  enum: [loan, realtor_prospecting]
                loan_type_filter:
                  type: string
                  nullable: true
                  enum: [purchase, refinance, null]
                realtor_role_filter:
                  type: string
                  nullable: true
                is_active: { type: boolean }
                nodes: { type: array, items: { type: object } }
                edges: { type: array, items: { type: object } }
      responses:
        "200":
          description: Saved
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SuccessResponse" }
        "400":
          description: Validation failure (invalid enum, duplicate key, missing label, or unresolved connection reference)
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, example: false }
                  message: { type: string }
    delete:
      tags: [Reminder Flows]
      summary: Delete a reminder flow
      security:
        - BrokerAuth: []
      parameters:
        - in: path
          name: flowId
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SuccessResponse" }

  /reminder-flows/{flowId}/toggle:
    patch:
      tags: [Reminder Flows]
      summary: Toggle a reminder flow active/inactive
      security:
        - BrokerAuth: []
      parameters:
        - in: path
          name: flowId
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Toggled
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      is_active: { type: boolean }

  /reminder-flow-executions:
    get:
      tags: [Reminder Flows]
      summary: List reminder flow execution history
      security:
        - BrokerAuth: []
      responses:
        "200":
          description: Executions
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      executions: { type: array, items: { type: object } }

  /reminder-flow-executions/{executionId}/respond:
    post:
      tags: [Reminder Flows]
      summary: Mark a flow execution as responded (stops further messages)
      security:
        - BrokerAuth: []
      parameters:
        - in: path
          name: executionId
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Marked responded
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SuccessResponse" }

  # ── Scheduler (Public) ────────────────────────────────────────────────────────
  /public/scheduler:
    get:
      tags: [Scheduler (Public)]
      summary: Get default broker's scheduler info and available dates
      description: Used by the public booking page when no broker token is specified.
      responses:
        "200":
          description: Scheduler info and available dates
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      broker: { type: object }
                      available_dates:
                        type: array
                        items: { type: string, format: date }

  /public/scheduler/{token}:
    get:
      tags: [Scheduler (Public)]
      summary: Get specific broker's scheduler info and available dates by public token
      parameters:
        - in: path
          name: token
          required: true
          schema: { type: string }
          description: Broker's `public_token`
      responses:
        "200":
          description: Scheduler info and available dates
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      broker: { type: object }
                      available_dates:
                        type: array
                        items: { type: string, format: date }
        "404":
          description: Broker not found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

  /public/scheduler/{token}/slots:
    get:
      tags: [Scheduler (Public)]
      summary: Get available time slots for a specific date
      parameters:
        - in: path
          name: token
          required: true
          schema: { type: string }
          description: Broker's `public_token` or `"default"`
        - in: query
          name: date
          required: true
          schema: { type: string, format: date }
          description: Date in YYYY-MM-DD format
      responses:
        "200":
          description: Available slots
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      slots:
                        type: array
                        items:
                          type: object
                          properties:
                            time: { type: string, example: "14:00" }
                            end_time: { type: string, example: "14:30" }
                            available: { type: boolean }

  /public/scheduler/book:
    post:
      tags: [Scheduler (Public)]
      summary: Book a meeting slot
      description: |
        Creates a confirmed meeting. Sends confirmation email to client and notification to broker.
        Creates a Zoom meeting automatically if `meeting_type: "video"` and Zoom credentials are configured.
        Creates a Teams meeting automatically if `meeting_type: "teams"` and Azure credentials are configured.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                [
                  broker_token,
                  client_name,
                  client_email,
                  meeting_date,
                  meeting_time,
                  meeting_type,
                ]
              properties:
                broker_token:
                  type: string
                  description: Broker `public_token`, short URL `slug`, or `"default"`
                client_name: { type: string }
                client_email: { type: string, format: email }
                client_phone: { type: string }
                meeting_date: { type: string, format: date }
                meeting_time:
                  type: string
                  example: "14:00"
                  description: HH:MM format
                meeting_type:
                  type: string
                  enum: [phone, video, teams, office]
                notes: { type: string }
      responses:
        "200":
          description: Meeting booked
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      meeting_id: { type: integer }
                      booking_token: { type: string }
                      zoom_join_url: { type: string, nullable: true }
                      zoom_start_url: { type: string, nullable: true }
                      teams_join_url: { type: string, nullable: true }
                      meeting_date: { type: string, format: date }
                      meeting_time: { type: string }
                      meeting_type: { type: string }
                      broker_name: { type: string }
        "400":
          description: Slot unavailable or validation error
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
        "409":
          description: Slot already taken
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
        "503":
          description: Video meeting requested but provider meeting could not be created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

  /public/scheduler/cancel/{bookingToken}:
    post:
      tags: [Scheduler (Public)]
      summary: Cancel a meeting by booking token
      description: Client-facing cancellation. Sends cancellation emails to both parties.
      parameters:
        - in: path
          name: bookingToken
          required: true
          schema: { type: string }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                reason: { type: string }
      responses:
        "200":
          description: Cancelled
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SuccessResponse" }
        "404":
          description: Meeting not found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

  /public/scheduler/reschedule/{bookingToken}:
    get:
      tags: [Scheduler (Public)]
      summary: Get current booking details for reschedule confirmation
      parameters:
        - in: path
          name: bookingToken
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Reschedule info loaded
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      broker_public_token: { type: string }
                      broker_name: { type: string, nullable: true }
                      broker_timezone: { type: string, nullable: true }
                      client_name: { type: string }
                      client_email: { type: string, format: email }
                      client_phone: { type: string, nullable: true }
                      meeting_type: { type: string, enum: [phone, video, teams, office] }
                      old_meeting_date: { type: string, format: date }
                      old_meeting_time: { type: string, example: "12:00:00" }
        "404":
          description: Booking not found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
        "410":
          description: Booking already cancelled
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
    post:
      tags: [Scheduler (Public)]
      summary: Cancel current booking and atomically book a new slot
      parameters:
        - in: path
          name: bookingToken
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [new_date, new_time]
              properties:
                new_date:
                  {
                    type: string,
                    example: "2026-05-10",
                    description: "New meeting date (YYYY-MM-DD)",
                  }
                new_time:
                  {
                    type: string,
                    example: "14:00",
                    description: "New meeting time (HH:MM)",
                  }
      responses:
        "200":
          description: Old booking cancelled and new booking confirmed
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      booking_token: { type: string }
                      meeting_date: { type: string }
                      meeting_time: { type: string }
                      zoom_join_url: { type: string, nullable: true }
                      teams_join_url: { type: string, nullable: true }
                      broker_name: { type: string }
        "400":
          description: Missing or invalid new_date / new_time, or slot unavailable
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
        "404":
          description: Booking not found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
        "409":
          description: Requested slot is already taken
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
        "410":
          description: Booking already cancelled
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
        "503":
          description: Video meeting requested but Zoom meeting could not be created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

  # ── Scheduler (Admin) ─────────────────────────────────────────────────────────
  /scheduler/settings:
    get:
      tags: [Scheduler (Admin)]
      summary: Get broker's scheduler settings and availability
      security:
        - BrokerAuth: []
      responses:
        "200":
          description: Settings and availability
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      settings: { type: object }
                      availability: { type: array, items: { type: object } }
    put:
      tags: [Scheduler (Admin)]
      summary: Update scheduler settings and availability windows
      security:
        - BrokerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                is_enabled: { type: boolean }
                meeting_title: { type: string }
                meeting_description: { type: string }
                slot_duration_minutes: { type: integer, example: 30 }
                buffer_time_minutes: { type: integer, example: 15 }
                advance_booking_days: { type: integer, example: 30 }
                min_booking_hours: { type: integer, example: 2 }
                timezone: { type: string, example: "America/Chicago" }
                allow_phone: { type: boolean }
                allow_video: { type: boolean }
                allow_teams: { type: boolean }
                allow_office: { type: boolean }
                availability:
                  type: array
                  items:
                    type: object
                    properties:
                      day_of_week: { type: integer, minimum: 0, maximum: 6 }
                      start_time: { type: string, example: "09:00" }
                      end_time: { type: string, example: "17:00" }
                      is_active: { type: boolean }
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SuccessResponse" }

  /scheduler/teams-eligibility:
    get:
      tags: [Scheduler (Admin)]
      summary: Check if current broker can enable Teams meetings
      security:
        - BrokerAuth: []
      responses:
        "200":
          description: Eligibility result
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      eligible: { type: boolean }
                      error: { type: string, nullable: true }

  /scheduler/meetings:
    get:
      tags: [Scheduler (Admin)]
      summary: List scheduled meetings
      description: Admins see all meetings; Partners only see their own.
      security:
        - BrokerAuth: []
      parameters:
        - in: query
          name: status
          schema:
            { type: string, enum: [confirmed, completed, cancelled, no_show] }
        - in: query
          name: from
          schema: { type: string, format: date }
        - in: query
          name: to
          schema: { type: string, format: date }
        - in: query
          name: broker_id
          schema: { type: integer }
          description: Filter by broker (admin only)
      responses:
        "200":
          description: Meetings list
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      meetings:
                        type: array
                        items: { $ref: "#/components/schemas/ScheduledMeeting" }
                      total: { type: integer }
    post:
      tags: [Scheduler (Admin)]
      summary: Create a meeting manually (admin)
      security:
        - BrokerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                [
                  client_name,
                  client_email,
                  meeting_date,
                  meeting_time,
                  meeting_type,
                ]
              properties:
                client_name: { type: string }
                client_email: { type: string, format: email }
                client_phone: { type: string }
                meeting_date: { type: string, format: date }
                meeting_time: { type: string, example: "10:00" }
                meeting_type: { type: string, enum: [phone, video, teams, office] }
                notes: { type: string }
                target_broker_id:
                  type: integer
                  description: Assign to a specific broker (admin only)
      responses:
        "200":
          description: Created
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      meeting_id: { type: integer }
                      booking_token: { type: string }
        "503":
          description: Video meeting requested but provider meeting could not be created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

  /scheduler/meetings/{meetingId}:
    put:
      tags: [Scheduler (Admin)]
      summary: Update a scheduled meeting (reschedule, cancel, add notes)
      security:
        - BrokerAuth: []
      parameters:
        - in: path
          name: meetingId
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  {
                    type: string,
                    enum: [confirmed, completed, cancelled, no_show],
                  }
                broker_notes: { type: string }
                meeting_date: { type: string, format: date }
                meeting_time: { type: string, example: "15:00" }
                meeting_type: { type: string, enum: [phone, video, teams, office] }
                cancelled_reason: { type: string }
                cancelled_by: { type: string, enum: [client, broker] }
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SuccessResponse" }

  # ── Calendar Events ──────────────────────────────────────────────────────────

  /scheduler/blocked-ranges:
    get:
      tags: [Scheduler (Admin)]
      summary: List blocked date/time ranges
      security:
        - BrokerAuth: []
      responses:
        "200":
          description: List of blocked ranges for the authenticated broker
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  blocked_ranges:
                    type: array
                    items:
                      $ref: "#/components/schemas/SchedulerBlockedRange"
    post:
      tags: [Scheduler (Admin)]
      summary: Add a blocked date/time range
      security:
        - BrokerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [start_datetime, end_datetime]
              properties:
                start_datetime:
                  {
                    type: string,
                    format: date-time,
                    example: "2026-04-20T09:00",
                  }
                end_datetime:
                  {
                    type: string,
                    format: date-time,
                    example: "2026-04-20T17:00",
                  }
                label: { type: string, example: "Vacation" }
      responses:
        "200":
          description: Blocked range created
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  blocked_range:
                    { $ref: "#/components/schemas/SchedulerBlockedRange" }
        "400":
          description: Validation error

  /scheduler/blocked-ranges/{id}:
    delete:
      tags: [Scheduler (Admin)]
      summary: Delete a blocked date/time range
      security:
        - BrokerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SuccessResponse" }
        "404":
          description: Not found

  /scheduler/calendar-sync/status:
    get:
      tags: [Scheduler (Admin)]
      summary: Get Office 365 calendar sync status
      description: Returns whether the broker has a connected O365 mailbox and info about the last sync.
      security:
        - BrokerAuth: []
      responses:
        "200":
          description: O365 calendar sync status
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  connected: { type: boolean }
                  mailbox_email: { type: string, nullable: true }
                  synced_count: { type: integer }
                  last_synced_at: { type: string, format: date-time, nullable: true }

  /scheduler/calendar-sync:
    post:
      tags: [Scheduler (Admin)]
      summary: Sync Office 365 calendar to blocked ranges
      description: Fetches the broker's Outlook calendar events for the next 60 days and stores them as blocked ranges so clients cannot book during busy times.
      security:
        - BrokerAuth: []
      responses:
        "200":
          description: Sync completed
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  synced_count: { type: integer }
                  message: { type: string }
        "400":
          description: No connected O365 mailbox found
        "500":
          description: Graph API or database error

  /broker/slug/check:
    get:
      tags: [Broker]
      summary: Check broker slug availability
      security:
        - BrokerAuth: []
      parameters:
        - in: query
          name: slug
          required: true
          schema: { type: string }
          description: Proposed slug to check (3–48 chars, a-z 0-9 -)
      responses:
        "200":
          description: Availability result
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  available: { type: boolean }
                  slug: { type: string }
        "400":
          description: Invalid slug format

  /broker/slug:
    put:
      tags: [Broker]
      summary: Update authenticated broker's own slug
      security:
        - BrokerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [slug]
              properties:
                slug:
                  type: string
                  description: New slug (3–48 lowercase letters, numbers, or hyphens)
      responses:
        "200":
          description: Slug updated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  slug: { type: string }
        "400":
          description: Invalid slug format
        "409":
          description: Slug already taken

  /calendar/events:
    get:
      tags: [Calendar]
      summary: List calendar events (birthdays, anniversaries, reminders, etc.)
      security:
        - BrokerAuth: []
      parameters:
        - in: query
          name: from
          schema: { type: string, format: date }
          description: Filter events on or after this date (YYYY-MM-DD)
        - in: query
          name: to
          schema: { type: string, format: date }
          description: Filter events on or before this date (YYYY-MM-DD)
        - in: query
          name: event_type
          schema:
            type: string
            enum:
              [
                birthday,
                home_anniversary,
                realtor_anniversary,
                important_date,
                reminder,
                other,
                all,
              ]
          description: Filter by event type (omit or "all" for all types)
        - in: query
          name: search
          schema: { type: string }
          description: Full-text search against title, linked client name, and linked person name
        - in: query
          name: sort_by
          schema:
            type: string
            enum:
              [event_date, title, event_type, linked_client_name, recurrence]
            default: event_date
          description: Column to sort by
        - in: query
          name: sort_order
          schema:
            type: string
            enum: [ASC, DESC]
            default: ASC
          description: Sort direction
      responses:
        "200":
          description: List of calendar events
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  events:
                    type: array
                    items: { $ref: "#/components/schemas/CalendarEvent" }
                  total: { type: integer }
    post:
      tags: [Calendar]
      summary: Create a new calendar event
      security:
        - BrokerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [event_type, title, event_date]
              properties:
                event_type:
                  type: string
                  enum:
                    [
                      birthday,
                      home_anniversary,
                      realtor_anniversary,
                      important_date,
                      reminder,
                      other,
                    ]
                title: { type: string }
                description: { type: string }
                event_date: { type: string, format: date }
                event_time: { type: string, example: "10:00" }
                all_day: { type: boolean, default: true }
                recurrence:
                  { type: string, enum: [none, yearly], default: none }
                color: { type: string, example: "#e81932" }
                linked_client_id: { type: integer, nullable: true }
                linked_person_name: { type: string }
      responses:
        "201":
          description: Event created
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  event: { $ref: "#/components/schemas/CalendarEvent" }

  /calendar/events/{eventId}:
    put:
      tags: [Calendar]
      summary: Update a calendar event
      security:
        - BrokerAuth: []
      parameters:
        - in: path
          name: eventId
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                event_type:
                  type: string
                  enum:
                    [
                      birthday,
                      home_anniversary,
                      realtor_anniversary,
                      important_date,
                      reminder,
                      other,
                    ]
                title: { type: string }
                description: { type: string, nullable: true }
                event_date: { type: string, format: date }
                event_time: { type: string, nullable: true }
                all_day: { type: boolean }
                recurrence: { type: string, enum: [none, yearly] }
                color: { type: string, nullable: true }
                linked_client_id: { type: integer, nullable: true }
                linked_person_name: { type: string, nullable: true }
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SuccessResponse" }
    delete:
      tags: [Calendar]
      summary: Delete a calendar event
      security:
        - BrokerAuth: []
      parameters:
        - in: path
          name: eventId
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SuccessResponse" }

  /calendar/sync-birthdays:
    post:
      tags: [Calendar]
      summary: Sync birthday events from clients and broker profiles
      description: >
        Upserts yearly birthday calendar events for all clients with a date_of_birth,
        and all broker_profiles (partners + mortgage bankers) with a date_of_birth.
        Admin only. Idempotent — safe to run multiple times.
      security:
        - BrokerAuth: []
      responses:
        "200":
          description: Sync result
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  created:
                    {
                      type: integer,
                      description: "Number of new birthday events created",
                    }
                  updated:
                    {
                      type: integer,
                      description: "Number of existing birthday events updated",
                    }
        "403":
          description: Admin only

  # ── Contact ───────────────────────────────────────────────────────────────────
  /contact:
    post:
      tags: [Contact]
      summary: Submit the public contact form
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, email, subject, message]
              properties:
                name: { type: string }
                email: { type: string, format: email }
                phone: { type: string }
                subject: { type: string }
                message: { type: string }
      responses:
        "201":
          description: Message received
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SuccessResponse" }
        "400":
          description: Missing required fields or invalid email
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
    get:
      tags: [Contact]
      summary: Get all contact form submissions (admin)
      security:
        - BrokerAuth: []
      responses:
        "200":
          description: Submissions
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      submissions: { type: array, items: { type: object } }

  # ── Proxy Utilities ───────────────────────────────────────────────────────────
  /proxy/pdf:
    get:
      tags: [Public]
      summary: Server-side PDF proxy (avoids CORS)
      description: Fetches a PDF from an external URL server-side and streams it to the browser. Used for PDF rendering in the client.
      parameters:
        - in: query
          name: url
          required: true
          schema: { type: string, format: uri }
      responses:
        "200":
          description: PDF stream
          content:
            application/pdf:
              schema:
                type: string
                format: binary
        "400":
          description: Invalid URL
        "502":
          description: Upstream error

  /image-proxy:
    get:
      tags: [Public]
      summary: Server-side image proxy (avoids CORS for PDF generation)
      description: Fetches an image from an external URL and forwards it. Cached for 24 hours. Used by jsPDF for embedding external images.
      parameters:
        - in: query
          name: url
          required: true
          schema: { type: string, format: uri }
      responses:
        "200":
          description: Image bytes
          content:
            image/*:
              schema:
                type: string
                format: binary
        "400":
          description: Invalid URL

  # ── Webhooks & Cron ───────────────────────────────────────────────────────────
  /webhooks/inbound-email:
    post:
      tags: [Webhooks & Cron]
      summary: Inbound email webhook (Postmark / Mailgun / SendGrid)
      description: |
        Receives inbound parsed emails from an email service provider and:
        1. Creates an inbound `communications` record.
        2. Upserts the `conversation_thread` via DB trigger.
        3. Marks any active `reminder_flow_executions` waiting on this
           conversation as responded so the cron can advance the flow.

        Protected by `INBOUND_WEBHOOK_SECRET` header — do NOT expose to public callers.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: Webhook payload (format varies by provider — Postmark, Mailgun, or SendGrid)
      responses:
        "200":
          description: Processed
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SuccessResponse" }

  /webhooks/inbound-sms:
    post:
      tags: [Webhooks & Cron]
      summary: Inbound SMS webhook (Twilio)
      description: |
        Receives inbound SMS messages from Twilio and:
        1. Looks up the client by sender phone number.
        2. Finds the most recent active flow execution for that client
           to determine the correct conversation_id.
        3. Creates an inbound `communications` record.
        4. Upserts the `conversation_thread` via DB trigger.
        5. Marks any active `reminder_flow_executions` waiting on this
           conversation as responded so the cron can advance the flow.
        6. Handles SMS consent keywords:
           - `STOP` => marks matching broker/client phone as unsubscribed from SMS broadcasts
           - `START` / `UNSTOP` => re-subscribes matching broker/client phone for SMS broadcasts

        Configure in Twilio Console → Phone Numbers → Active Numbers → Messaging:
          Webhook URL: `https://yourdomain.com/api/webhooks/inbound-sms`
          HTTP Method: `POST`

        Protected by optional `INBOUND_WEBHOOK_SECRET` header.
        Returns an empty TwiML `<Response>` so Twilio does not auto-reply.
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required: [Body, From, To, MessageSid]
              properties:
                Body:
                  type: string
                  description: SMS message text
                From:
                  type: string
                  description: Sender E.164 phone number (e.g. +15550001111)
                To:
                  type: string
                  description: Your Twilio number (e.g. +15559990000)
                MessageSid:
                  type: string
                  description: Twilio message SID
                AccountSid:
                  type: string
                  description: Twilio account SID
      responses:
        "200":
          description: Empty TwiML response
          content:
            text/xml:
              schema:
                type: string
                example: "<Response></Response>"

  /cron/poll-inbound-email:
    get:
      tags: [Webhooks & Cron]
      summary: Poll IMAP inbox for inbound emails (cron trigger)
      description: |
        Called by Vercel Cron or cPanel cron via curl.
        Polls the configured IMAP inbox, ingests new emails as conversation messages,
        and marks matching active reminder flow executions as responded.
      responses:
        "200":
          description: Poll complete
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SuccessResponse" }

  /cron/process-reminder-flows:
    get:
      tags: [Webhooks & Cron]
      summary: Process pending reminder flow executions (cron trigger)
      description: |
        Run every 5–15 minutes via cPanel cron:
        `curl -s "https://yourdomain.com/api/cron/process-reminder-flows?secret=CRON_SECRET"`

        Processes all pending flow execution steps and sends due messages.
      parameters:
        - in: query
          name: secret
          required: false
          schema: { type: string }
          description: Shared secret matching `CRON_SECRET` env var
      responses:
        "200":
          description: Processing complete
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SuccessResponse" }

  /cron/backfill-message-status:
    get:
      tags: [Webhooks & Cron]
      summary: Backfill stale Twilio delivery_status (cron trigger)
      description: |
        Run every ~10 minutes via cPanel cron:
        `curl -s "https://yourdomain.com/api/cron/backfill-message-status?secret=CRON_SECRET"`

        Picks up to 50 outbound SMS/MMS/WhatsApp rows whose `delivery_status`
        is still `sent`/`pending` more than 2 minutes after `sent_at`,
        queries Twilio for the authoritative status, and updates the row.
        Catches messages whose `statusCallback` webhook never arrived.
      parameters:
        - in: query
          name: secret
          required: false
          schema: { type: string }
          description: Shared secret matching `CRON_SECRET` env var
      responses:
        "200":
          description: Backfill complete
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  checked: { type: integer }
                  updated: { type: integer }
                  unchanged: { type: integer }

  /cron/expire-quota-reservations:
    get:
      tags: [Webhooks & Cron]
      summary: Expire stale quota broadcast reservations (cron trigger)
      description: |
        Run every 15–30 minutes via cPanel cron:
        `curl -s "https://yourdomain.com/api/cron/expire-quota-reservations?secret=CRON_SECRET"`

        Releases reserved SMS/email units held by `tenant_usage_reservations` rows
        past `expires_at` (default TTL 120 minutes).
      parameters:
        - in: query
          name: secret
          required: false
          schema: { type: string }
          description: Shared secret matching `CRON_SECRET` env var
      responses:
        "200":
          description: Sweeper complete
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  expired: { type: integer }
                  errors: { type: integer }

  /cron/sync-o365-calendars:
    get:
      tags: [Webhooks & Cron]
      summary: Sync Outlook calendar events into scheduler blocked ranges (cron trigger)
      description: |
        Iterates all active Office 365 mailboxes and syncs the next 60 days of
        calendar events (busy/tentative/oof) into `scheduler_blocked_ranges`.
        Per-mailbox errors are logged and included in the response but do not
        fail the overall job. Only `active` mailboxes are processed — mailboxes
        in `auth_required` state are skipped (delegated token may lack `Calendars.Read`).

        Suggested schedule: every 30 minutes.
        `curl -s "https://yourdomain.com/api/cron/sync-o365-calendars?secret=CRON_SECRET"`
      parameters:
        - in: query
          name: secret
          required: false
          schema: { type: string }
          description: Shared secret matching `CRON_SECRET` env var
      responses:
        "200":
          description: Calendar sync complete
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  mailboxes: { type: integer, description: Number of active mailboxes processed }
                  total_synced: { type: integer, description: Total calendar events synced across all mailboxes }
                  errors: { type: integer, description: Number of mailboxes that encountered errors }
                  results:
                    type: array
                    items:
                      type: object
                      properties:
                        mailbox_id: { type: integer }
                        email: { type: string }
                        synced_count: { type: integer }
                        error: { type: string, nullable: true }
        "401":
          description: Invalid or missing CRON_SECRET

  /cron/sync-teams-policy:
    get:
      tags: [Webhooks & Cron]
      summary: Sync Teams application-access policy for teams-enabled users (cron trigger)
      description: |
        Runs the server script that grants Teams app-access policy for active users
        with `allow_teams = 1`.

        Run daily via cPanel cron:
        `curl -s "https://yourdomain.com/api/cron/sync-teams-policy?secret=CRON_SECRET"`
      parameters:
        - in: query
          name: secret
          required: false
          schema: { type: string }
          description: Shared secret matching `CRON_SECRET` env var
      responses:
        "200":
          description: Teams policy sync complete
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  message: { type: string }
                  output: { type: string, nullable: true }
                  warnings: { type: string, nullable: true }

  # ─── Realtor Prospecting Pipeline ─────────────────────────────────────────
  /realtor-prospects:
    get:
      tags: [Realtor Prospecting]
      summary: List realtor prospects
      description: >
        Returns all realtor prospect opportunities for the logged-in broker.
        Superadmins see all; others see only their own (created or owned).
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: stage
          schema:
            type: string
            enum:
              [
                contact_attempted,
                contacted,
                appt_set,
                waiting_for_1st_deal,
                first_deal_funded,
                second_deal_funded,
                top_agent_whale,
              ]
        - in: query
          name: status
          schema: { type: string, enum: [open, won, lost] }
        - in: query
          name: search
          schema: { type: string }
        - in: query
          name: owner_broker_id
          schema: { type: integer }
      responses:
        "200":
          description: List of realtor prospects
    post:
      tags: [Realtor Prospecting]
      summary: Create a realtor prospect opportunity
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [opportunity_name]
              properties:
                opportunity_name: { type: string }
                stage:
                  {
                    type: string,
                    enum:
                      [
                        contact_attempted,
                        contacted,
                        appt_set,
                        waiting_for_1st_deal,
                        first_deal_funded,
                        second_deal_funded,
                        top_agent_whale,
                      ],
                  }
                status: { type: string, enum: [open, won, lost] }
                opportunity_value: { type: number }
                contact_name: { type: string }
                contact_email: { type: string }
                contact_phone: { type: string }
                business_name: { type: string }
                opportunity_source: { type: string }
                tags: { type: array, items: { type: string } }
                notes: { type: string }
                owner_broker_id: { type: integer, nullable: true }
                followers: { type: array, items: { type: integer } }
                progress_report:
                  { type: string, enum: [ready_to_send, sent], nullable: true }
                add_to_refi_rates_dropped: { type: boolean }
      responses:
        "201":
          description: Realtor prospect created
  /realtor-prospects/{id}:
    get:
      tags: [Realtor Prospecting]
      summary: Get a single realtor prospect
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Realtor prospect details
    patch:
      tags: [Realtor Prospecting]
      summary: Update a realtor prospect
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      requestBody:
        content:
          application/json:
            schema:
              type: object
      responses:
        "200":
          description: Updated prospect
    delete:
      tags: [Realtor Prospecting]
      summary: Delete a realtor prospect
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Deleted
  /realtor-prospects/{id}/stage:
    patch:
      tags: [Realtor Prospecting]
      summary: Update the stage of a realtor prospect (drag & drop)
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [stage]
              properties:
                stage:
                  {
                    type: string,
                    enum:
                      [
                        contact_attempted,
                        contacted,
                        appt_set,
                        waiting_for_1st_deal,
                        first_deal_funded,
                        second_deal_funded,
                        top_agent_whale,
                      ],
                  }
      responses:
        "200":
          description: Stage updated

  /notifications:
    get:
      tags: [Notifications]
      summary: List notifications for the authenticated broker
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: unread_only
          schema: { type: string, enum: ["1"] }
          description: When "1", returns only unread notifications.
        - in: query
          name: limit
          schema: { type: integer, default: 50, maximum: 200 }
      responses:
        "200":
          description: List of broker notifications
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  unread_count: { type: integer }
                  notifications:
                    type: array
                    items:
                      type: object
                      properties:
                        id: { type: integer }
                        title: { type: string }
                        message: { type: string }
                        notification_type:
                          { type: string, enum: [info, success, warning, error] }
                        category:
                          {
                            type: string,
                            enum: [message, call, loan, client, task, flow, lead, system],
                          }
                        is_read: { type: boolean }
                        action_url: { type: string, nullable: true }
                        created_at: { type: string, format: date-time }
                        read_at: { type: string, format: date-time, nullable: true }

  /notifications/{id}/read:
    put:
      tags: [Notifications]
      summary: Mark a single notification as read
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Notification marked as read

  /notifications/read-all:
    put:
      tags: [Notifications]
      summary: Mark all notifications as read for the authenticated broker
      security:
        - bearerAuth: []
      responses:
        "200":
          description: All notifications marked as read

  /notifications/{id}:
    delete:
      tags: [Notifications]
      summary: Dismiss (delete) a notification
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Notification deleted

  # ─── Realtor Broadcast Center ─────────────────────────────────────────────
  /realtor-broadcasts/preview:
    post:
      tags: [Broadcasts]
      summary: Preview audience count and sample for a broadcast
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [audience_filter, channel]
              properties:
                channel: { type: string, enum: [email, sms, both] }
                audience_filter:
                  type: object
                  properties:
                    segments: { type: array, items: { type: string } }
                    excluded_ids: { type: array, items: { type: integer } }
                    stage_filter: { type: array, items: { type: string } }
                    tag_filter: { type: array, items: { type: string } }
                    owner_broker_id: { type: integer }
      responses:
        "200":
          description: Audience preview including skipped recipients (e.g. missing contact or SMS consent not granted)
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  preview:
                    type: object
                    properties:
                      count: { type: integer }
                      email_count: { type: integer }
                      sms_count: { type: integer }
                      skipped_count: { type: integer }
                      estimated_sms_segments: { type: integer }
                      estimated_email_sends: { type: integer }
                      sample: { type: array, items: { type: object } }
                  quota:
                    $ref: "#/components/schemas/UnifiedQuotaSummary"

  /realtor-broadcasts/unsubscribe:
    get:
      tags: [Broadcasts]
      summary: Public CAN-SPAM email unsubscribe link (no auth required)
      parameters:
        - in: query
          name: token
          required: true
          schema: { type: string }
      responses:
        "200":
          description: HTML unsubscribe confirmation page
          content:
            text/html:
              schema: { type: string }

  /realtor-broadcasts:
    get:
      tags: [Broadcasts]
      summary: List all broadcasts for the tenant (platform_owner only)
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: page
          schema: { type: integer, default: 1 }
        - in: query
          name: limit
          schema: { type: integer, default: 50 }
      responses:
        "200":
          description: Broadcast list
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  broadcasts: { type: array, items: { type: object } }
                  total: { type: integer }
                  quota:
                    $ref: "#/components/schemas/UnifiedQuotaSummary"
    post:
      tags: [Broadcasts]
      summary: Create and optionally send a broadcast (platform_owner only)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [title, channel, audience_filter]
              properties:
                title: { type: string }
                channel: { type: string, enum: [email, sms, both] }
                subject: { type: string }
                body_email: { type: string }
                body_sms: { type: string }
                audience_filter: { type: object }
                scheduled_at: { type: string, format: date-time }
                send_now: { type: boolean, default: true }
      responses:
        "200":
          description: Broadcast created and queued. Final delivery status becomes `sent` only when at least one recipient is delivered; otherwise it finalizes as `failed`. Conversation threads are lazily materialized on interaction (e.g., inbound reply), while delivery/audit records are written immediately.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  broadcast_id: { type: integer }
                  recipient_count: { type: integer }
                  status: { type: string, enum: [draft, scheduled, sending] }
                  estimated_sms_segments: { type: integer }
                  estimated_email_sends: { type: integer }
                  quota:
                    $ref: "#/components/schemas/UnifiedQuotaSummary"
        "402":
          description: Not enough unified quota to reserve broadcast send budget
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BillingDenialPayload"

  /realtor-broadcasts/{id}:
    get:
      tags: [Broadcasts]
      summary: Get a single broadcast (platform_owner only)
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Broadcast detail
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  broadcast: { type: object }
                  quota:
                    $ref: "#/components/schemas/UnifiedQuotaSummary"
    patch:
      tags: [Broadcasts]
      summary: Update a draft or scheduled broadcast
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title: { type: string }
                channel: { type: string }
                subject: { type: string }
                body_email: { type: string }
                body_sms: { type: string }
                audience_filter: { type: object }
                scheduled_at: { type: string, format: date-time }
      responses:
        "200":
          description: Updated
    delete:
      tags: [Broadcasts]
      summary: Delete a draft or scheduled broadcast (platform_owner only)
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Deleted

  /realtor-broadcasts/{id}/cancel:
    patch:
      tags: [Broadcasts]
      summary: Cancel a sending or scheduled broadcast
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Cancellation flagged

  /realtor-broadcasts/{id}/recipients:
    get:
      tags: [Broadcasts]
      summary: Get paginated recipient delivery log for a broadcast
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
        - in: query
          name: page
          schema: { type: integer, default: 1 }
        - in: query
          name: limit
          schema: { type: integer, default: 100 }
      responses:
        "200":
          description: Recipient list with per-row delivery status (`pending`, `sent`, `failed`, `opened`, `unsubscribed`, `skipped_no_contact`, `undelivered`, `opted_out`) where `opted_out` represents explicit SMS unsubscribe (e.g. STOP)

  /realtor-broadcasts/{id}/resend-failed:
    post:
      tags: [Broadcasts]
      summary: Retry all failed recipients for a broadcast (platform_owner only)
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Number of recipients re-queued
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  retried: { type: integer }
        "402":
          description: Not enough unified quota to retry failed recipients
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BillingDenialPayload"

  /realtor-broadcasts/{id}/resend-pending:
    post:
      tags: [Broadcasts]
      summary: Re-trigger pending recipients (and newly reachable skipped recipients) for a completed broadcast (platform_owner only)
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Number of pending recipients re-triggered
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  retried: { type: integer }
        "402":
          description: Not enough unified quota to re-trigger pending recipients
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BillingDenialPayload"

  /realtor-broadcasts/{id}/recipients/export:
    get:
      tags: [Broadcasts]
      summary: Export recipient delivery log as CSV (platform_owner only)
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: CSV file download
          content:
            text/csv:
              schema:
                type: string
                format: binary

  /track/open/{token}:
    get:
      tags: [Broadcasts]
      summary: Email open tracking pixel (public — no auth)
      parameters:
        - in: path
          name: token
          required: true
          schema: { type: string }
          description: Recipient's unsubscribe_token used as tracking identifier
      responses:
        "200":
          description: 1×1 transparent GIF; side-effect sets email_status to opened
          content:
            image/gif:
              schema:
                type: string
                format: binary

  /broadcast-segments:
    get:
      tags: [Broadcasts]
      summary: List saved audience segment presets (platform_owner only)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: List of saved segments
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  segments:
                    type: array
                    items:
                      type: object
                      properties:
                        id: { type: integer }
                        name: { type: string }
                        filter_json: { type: object }
                        created_at: { type: string, format: date-time }
    post:
      tags: [Broadcasts]
      summary: Save a new audience segment preset (platform_owner only)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, filter_json]
              properties:
                name: { type: string }
                filter_json: { type: object }
      responses:
        "200":
          description: Created segment
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  id: { type: integer }

  /broadcast-segments/{id}:
    delete:
      tags: [Broadcasts]
      summary: Delete a saved audience segment preset (platform_owner only)
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }

  /billing/config:
    get:
      tags: [Billing]
      summary: Billing flags and plan snapshot (platform_owner only)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Billing configuration
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  config:
                    type: object
                    properties:
                      billingQuotaMode:
                        type: string
                        enum: [off, shadow, warn, enforce]
                      billingUiEnabled: { type: boolean }
                      billingOverageEnabled: { type: boolean }
                      billingEnforceBroadcastDaily: { type: boolean }
                      platformFeeUsd: { type: number }
                      plan:
                        type: object
                        properties:
                          platformFeeUsd: { type: number }
                          includedSmsSegments: { type: integer }
                          includedVoiceMinutes: { type: integer }
                          includedEmailSends: { type: integer }
                          includedSchedulerBookings: { type: integer }
                          includedMortgiAiTokens: { type: integer }
                      subscription:
                        type: object
                        nullable: true
                        properties:
                          planCode: { type: string }
                          status: { type: string }
                          periodStart: { type: string, format: date }
                          periodEnd: { type: string, format: date, nullable: true }
                      stripeEnabled: { type: boolean }
                      stripePublishableKey: { type: string, nullable: true }
                      stripeTestMode: { type: boolean }
                      stripePlatformSubscriptionConfigured: { type: boolean }
                      stripeSubscriptionLinked: { type: boolean }
                      stripeSubscriptionActive: { type: boolean }
                      stripeSubscriptionStatus: { type: string, nullable: true }
                      hasPaymentMethod: { type: boolean }
                      stripeCustomerId: { type: string, nullable: true }
                      billingInternalEconomicsEnabled:
                        type: boolean
                        description: Dev/finance only — when false, COGS/margin/infra are stripped from API and UI
        "403":
          description: Not platform_owner

  /billing/stripe/packs:
    get:
      tags: [Billing]
      summary: Legacy flat pack catalog (prefer /top-up-options)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: All tier pack ids with optional economics (internal mode)

  /billing/stripe/top-up-options:
    get:
      tags: [Billing]
      summary: Tiered top-up catalog by channel (platform_owner)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Channels with tier steps, chip labels, and optional economics

  /billing/stripe/quote:
    post:
      tags: [Billing]
      summary: Price a top-up tier before charge (platform_owner)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [dimension, tier_index]
              properties:
                dimension:
                  type: string
                  enum: [sms_segments, voice_minutes, email_sends, scheduler_bookings, mortgi_ai_tokens]
                tier_index: { type: integer, minimum: 0 }
      responses:
        "200":
          description: Quote with units, amountCents, label

  /billing/stripe/charge-quote:
    post:
      tags: [Billing]
      summary: Charge saved card for a quoted top-up tier (platform_owner)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [dimension, tier_index]
              properties:
                dimension:
                  type: string
                  enum: [sms_segments, voice_minutes, email_sends, scheduler_bookings, mortgi_ai_tokens]
                tier_index: { type: integer, minimum: 0 }
      responses:
        "200":
          description: Quota granted after successful charge
        "402":
          description: Card authentication required (3DS)

  /billing/stripe/charge-pack:
    post:
      tags: [Billing]
      summary: Charge a top-up pack using the saved payment method (platform_owner only)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [pack_id]
              properties:
                pack_id:
                  type: string
                  description: Legacy tier id (e.g. sms_1k, sms_5k, mortgi_250k)
      responses:
        "200":
          description: Pack charged and quota granted
        "400":
          description: No payment method on file or invalid pack
        "402":
          description: Card authentication required (3DS)

  /billing/estimate:
    post:
      tags: [Billing]
      summary: Budget forecast estimate (canvas calculator parity)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                convoSmsPerMonth: { type: number }
                convoEmailPerMonth: { type: number }
                voiceMinutesPerMonth: { type: number }
                schedulerBookingsPerMonth: { type: number }
                blastsPerMonth: { type: number }
                recipientsPerBlast: { type: number }
                smsSegmentsPerRecipient: { type: number }
                emailPerBlast: { type: boolean }
                extraTwilioNumbers: { type: number }
                zoomBrokerLicenses: { type: number }
                mortgiAiTokensPerMonth: { type: number }
      responses:
        "200":
          description: Forecast breakdown

  /billing/usage:
    get:
      tags: [Billing]
      summary: Live 30-day usage and expenditure (platform_owner only)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Usage snapshot with expenditure breakdown
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  refreshedAt: { type: string, format: date-time }
                  usage:
                    type: object
                    properties:
                      periodStart: { type: string, format: date }
                      periodEnd: { type: string, format: date }
                      tenantId: { type: integer }
                      totalSmsSegments: { type: integer }
                      broadcastSmsSegments: { type: integer }
                      convoSmsSegments: { type: integer }
                      totalEmailSends: { type: integer }
                      broadcastEmailSends: { type: integer }
                      callsLogged: { type: integer }
                      voiceMinutesRecorded: { type: number }
                      voiceMinutesEstimated: { type: number }
                      schedulerBookings: { type: integer }
                      mortgiAiTokens: { type: integer }
                      mortgiSessions: { type: integer }
                      mortgiUserMessages: { type: integer }
                  expenditure:
                    type: object
                    properties:
                      voiceMinutesBilled: { type: number }
                      variableUsageCogsUsd: { type: number }
                      fixedInfraCogsUsd: { type: number }
                      totalPlatformCogsUsd: { type: number }
                      overageRetailUsd: { type: number }
                      platformFeeUsd: { type: number }
                      addonsUsd: { type: number }
                      ownerTotalUsd: { type: number }
                      estimatedMarginUsd: { type: number }
                      pctSms: { type: integer }
                      pctVoice: { type: integer }
                      pctEmail: { type: integer }
                      pctScheduler: { type: integer }
                      pctMortgiAiTokens: { type: integer }
                      mortgiCogsUsd: { type: number }
        "403":
          description: Not platform_owner

  /billing/team-notice:
    get:
      tags: [Billing]
      summary: Billing notice for brokers and admins (no payment UI)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Team-facing grace, restricted, suspended, or quota notice
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  notice:
                    $ref: "#/components/schemas/BillingTeamNotice"

  /billing/access:
    get:
      tags: [Billing]
      summary: Billing access ladder state (grace, restricted, suspended, quota block)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Current access level and gating flags (platform_owner only)
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  access:
                    $ref: "#/components/schemas/BillingAccessState"
        "403":
          description: Not platform_owner

  /billing/access/simulate:
    post:
      tags: [Billing]
      summary: Simulate subscription past_due or active (Stripe test mode, platform_owner)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [scenario]
              properties:
                scenario:
                  type: string
                  enum: [past_due, active]
      responses:
        "200":
          description: Updated access state after simulation
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  access:
                    $ref: "#/components/schemas/BillingAccessState"
        "403":
          description: Not platform_owner or not in test mode

  /billing/quota:
    get:
      tags: [Billing]
      summary: Unified quota summary with reserved units (platform_owner only)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Live quota balances per dimension
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  quota:
                    $ref: "#/components/schemas/UnifiedQuotaSummary"
        "403":
          description: Not platform_owner

  /billing/purchases:
    get:
      tags: [Billing]
      summary: Active period capacity breakdown and top-up purchase history (platform_owner)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Plan vs top-up capacity per channel and recent Stripe top-ups
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  activePeriod:
                    type: object
                    properties:
                      periodStart: { type: string }
                      periodEnd: { type: string, nullable: true }
                      subscriptionStatus: { type: string, nullable: true }
                      platformFeeUsd: { type: number }
                      capacities:
                        type: array
                        items:
                          type: object
                  purchases:
                    type: array
                    items:
                      type: object
        "403":
          description: Not platform_owner

  /billing/stripe/config:
    get:
      tags: [Billing]
      summary: Stripe publishable key and test-mode flag (platform_owner)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Public Stripe config for Elements
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  enabled: { type: boolean }
                  publishableKey: { type: string, nullable: true }
                  testMode: { type: boolean }
                  webhookConfigured: { type: boolean }

  /billing/stripe/packs:
    get:
      tags: [Billing]
      summary: List available Stripe top-up packs
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Top-up pack catalog
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  packs:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                          enum:
                            - sms_1k
                            - voice_1k
                            - email_1k
                            - scheduler_50
                            - mortgi_100k
                        dimension: { type: string }
                        units: { type: integer }
                        label: { type: string }
                        amountCents: { type: integer }

  /billing/stripe/payment-intent:
    post:
      tags: [Billing]
      summary: Create PaymentIntent for embedded Stripe Elements checkout
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [pack_id]
              properties:
                pack_id: { type: string, example: sms_1k }
      responses:
        "200":
          description: client_secret for Stripe Elements
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  client_secret: { type: string }
                  payment_intent_id: { type: string }
                  pack:
                    type: object
                    properties:
                      id: { type: string }
                      dimension: { type: string }
                      units: { type: integer }
                      label: { type: string }
                      amountCents: { type: integer }
        "503":
          description: Stripe not configured

  /billing/stripe/confirm-payment:
    post:
      tags: [Billing]
      summary: Verify succeeded PaymentIntent and grant quota (idempotent)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [payment_intent_id]
              properties:
                payment_intent_id: { type: string }
      responses:
        "200":
          description: Quota updated or already fulfilled
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  granted: { type: boolean }
                  already_fulfilled: { type: boolean }
                  pack:
                    type: object
                    nullable: true
                  quota:
                    $ref: "#/components/schemas/UnifiedQuotaSummary"

  /billing/stripe/checkout:
    post:
      tags: [Billing]
      summary: Create Stripe Checkout session for a quota top-up pack (redirect fallback)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [pack_id]
              properties:
                pack_id: { type: string, example: sms_1k }
      responses:
        "200":
          description: Checkout session URL
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  url: { type: string, nullable: true }
                  session_id: { type: string }
        "503":
          description: Stripe not configured

  /billing/stripe/subscription-setup:
    post:
      tags: [Billing]
      summary: Start $350/mo platform subscription (Payment Element client_secret)
      security:
        - bearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                force_new:
                  type: boolean
                  description: Cancel incomplete subscription and start fresh (Retry setup)
      responses:
        "200":
          description: Subscription payment intent ready, or already active
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  client_secret: { type: string, nullable: true }
                  subscription_id: { type: string }
                  stripe_status: { type: string }
                  already_active: { type: boolean }
        "503":
          description: Stripe or STRIPE_PLATFORM_PRICE_ID not configured

  /billing/stripe/confirm-subscription:
    post:
      tags: [Billing]
      summary: Sync tenant_subscription after successful subscription payment
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [subscription_id]
              properties:
                subscription_id: { type: string }
      responses:
        "200":
          description: Subscription active and synced
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  stripe_status: { type: string }
                  subscription: { type: object, nullable: true }
                  payment_method:
                    type: object
                    nullable: true
                    properties:
                      id: { type: string }
                      brand: { type: string }
                      last4: { type: string }
                      expMonth: { type: integer }
                      expYear: { type: integer }
        "400":
          description: Subscription not active yet

  /billing/stripe/reset-subscription-test:
    post:
      tags: [Billing]
      summary: Cancel all test Stripe subscriptions, reset quota periods/ledger, and clear billing state (Stripe test mode only)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Subscription reset for retesting subscribe flow
        "403":
          description: Not available in live mode

  /billing/stripe/payment-method:
    get:
      tags: [Billing]
      summary: Get saved default payment method for the tenant Stripe customer
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Saved card summary or null

  /billing/stripe/payment-method-setup:
    post:
      tags: [Billing]
      summary: Create SetupIntent to update saved payment method (Payment Element)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: client_secret for embedded card update form

  /billing/stripe/confirm-payment-method:
    post:
      tags: [Billing]
      summary: Set default payment method after SetupIntent succeeds
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [setup_intent_id]
              properties:
                setup_intent_id: { type: string }
      responses:
        "200":
          description: Payment method saved and set as default

  /billing/stripe/portal:
    post:
      tags: [Billing]
      summary: Open Stripe Customer Portal (optional payment_method_update flow)
      security:
        - bearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                flow:
                  type: string
                  enum: [payment_method_update]
      responses:
        "200":
          description: Portal session URL
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  url: { type: string }
        "400":
          description: No Stripe customer on file

  /billing/stripe/webhook:
    post:
      tags: [Billing]
      summary: Stripe webhook (checkout.session.completed grants top-up units)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        "200":
          description: Event received

  /cron/process-scheduled-broadcasts:
    get:
      tags: [Cron]
      summary: Process due scheduled broadcasts (cron-protected endpoint)
      parameters:
        - in: query
          name: secret
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Number of broadcasts fired
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  fired: { type: integer }
