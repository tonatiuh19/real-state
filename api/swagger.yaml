openapi: 3.0.3
info:
  title: Encore Mortgage API
  description: |
    Full REST API for the Encore Mortgage platform.

    ## Authentication
    - **Broker/Admin routes** require `Authorization: Bearer <broker_session_token>`
    - **Client portal routes** require `Authorization: Bearer <client_session_token>`
    - **Public routes** require no authentication
    - **Webhook/Cron routes** are protected by shared secrets in query params or headers

    ## Base URL
    All endpoints are prefixed with `/api`.

    ## Email Delivery Notes
    - General outbound email uses `SMTP_*` environment variables.
    - Reminder flow email steps can use `REMINDER_SMTP_*` overrides when configured.
  version: "1.0.0"
  contact:
    name: Encore Mortgage Dev

servers:
  - url: /api
    description: Same-origin (development & production on port 8080)

tags:
  - name: Health
    description: System health checks
  - name: Admin Auth
    description: Broker / admin authentication (passwordless OTP)
  - name: Client Auth
    description: Client portal authentication (passwordless OTP)
  - name: Admin Bootstrap
    description: Session init and section controls
  - name: Admin Profile
    description: Authenticated broker's own profile management
  - name: Dashboard
    description: Overview stats and broker performance metrics
  - name: Loans
    description: Loan application management
  - name: Pre-Approval
    description: Pre-approval letter generation and delivery
  - name: Clients
    description: Client directory (admin view)
  - name: Brokers
    description: Broker / team member management
  - name: Tasks
    description: Task templates and loan-linked task instances
  - name: Documents
    description: Document uploads and management
  - name: Email Templates
    description: Email communication templates
  - name: SMS Templates
    description: SMS communication templates
  - name: WhatsApp Templates
    description: WhatsApp communication templates
  - name: Pipeline Step Templates
    description: Per-step communication templates for the pipeline
  - name: Conversations
    description: Inbound/outbound message threads
  - name: Audit Logs
    description: Activity history
  - name: Reports
    description: Analytics and reporting
  - name: Settings
    description: Tenant-level system settings
  - name: Reminder Flows
    description: Automated reminder sequences
  - name: Scheduler (Public)
    description: Public-facing booking endpoints
  - name: Scheduler (Admin)
    description: Admin scheduler settings and meeting management
  - name: Contact
    description: Public contact form submissions
  - name: Public
    description: Unauthenticated public endpoints
  - name: Webhooks & Cron
    description: Inbound webhooks and scheduled cron triggers

# ─── Security Schemes ─────────────────────────────────────────────────────────
components:
  securitySchemes:
    BrokerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Broker session token stored in `localStorage["broker_session"]`
    ClientAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Client session token stored in `localStorage["client_session_token"]`

  # ─── Reusable Schemas ───────────────────────────────────────────────────────
  schemas:
    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true

    ErrorResponse:
      type: object
      properties:
        success:
          type: boolean
          example: false
        error:
          type: string
          example: "Something went wrong"
        message:
          type: string

    BrokerUser:
      type: object
      properties:
        id: { type: integer }
        email: { type: string, format: email }
        first_name: { type: string }
        last_name: { type: string }
        phone: { type: string, nullable: true }
        role:
          type: string
          enum: [admin, broker]
          description: "admin = Mortgage Banker, broker = Partner (Realtor)"
        tenant_id: { type: integer }
        status:
          type: string
          enum: [active, inactive, suspended]
        license_number: { type: string, nullable: true }
        specializations:
          type: array
          items: { type: string }
          nullable: true
        email_verified: { type: boolean }
        last_login: { type: string, format: date-time, nullable: true }
        public_token: { type: string, nullable: true }
        avatar_url: { type: string, nullable: true }
        bio: { type: string, nullable: true }
        office_address: { type: string, nullable: true }
        office_city: { type: string, nullable: true }
        office_state: { type: string, nullable: true }
        office_zip: { type: string, nullable: true }
        years_experience: { type: integer, nullable: true }
        total_loans_closed: { type: integer, nullable: true }

    ClientInfo:
      type: object
      properties:
        id: { type: integer }
        email: { type: string, format: email }
        first_name: { type: string }
        last_name: { type: string }
        phone: { type: string, nullable: true }
        tenant_id: { type: integer }

    LoanApplication:
      type: object
      properties:
        id: { type: integer }
        application_number: { type: string }
        client_user_id: { type: integer }
        broker_user_id: { type: integer, nullable: true }
        partner_broker_id: { type: integer, nullable: true }
        loan_type: { type: string }
        loan_amount: { type: number }
        property_value: { type: number }
        property_address: { type: string, nullable: true }
        property_city: { type: string, nullable: true }
        property_state: { type: string, nullable: true }
        property_zip: { type: string, nullable: true }
        property_type: { type: string, nullable: true }
        down_payment: { type: number, nullable: true }
        loan_purpose: { type: string, nullable: true }
        status: { type: string }
        current_step: { type: integer }
        total_steps: { type: integer }
        priority: { type: string, nullable: true }
        estimated_close_date: { type: string, format: date, nullable: true }
        actual_close_date: { type: string, format: date, nullable: true }
        interest_rate: { type: number, nullable: true }
        loan_term_months: { type: integer, nullable: true }
        notes: { type: string, nullable: true }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    Task:
      type: object
      properties:
        id: { type: integer }
        title: { type: string }
        description: { type: string, nullable: true }
        status: { type: string }
        due_date: { type: string, format: date, nullable: true }
        loan_application_id: { type: integer, nullable: true }
        assigned_to: { type: integer, nullable: true }
        created_at: { type: string, format: date-time }

    AdminSectionControl:
      type: object
      properties:
        id: { type: integer }
        tenant_id: { type: integer }
        section_id:
          type: string
          description: Matches the sidebar menu item id
          example: "pipeline"
        is_disabled: { type: boolean }
        tooltip_message: { type: string, example: "Coming Soon" }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    ScheduledMeeting:
      type: object
      properties:
        id: { type: integer }
        broker_id: { type: integer }
        client_name: { type: string }
        client_email: { type: string, format: email }
        client_phone: { type: string, nullable: true }
        meeting_date: { type: string, format: date }
        meeting_time: { type: string, example: "14:00" }
        meeting_end_time: { type: string, example: "14:30" }
        meeting_type:
          type: string
          enum: [phone, video]
        status:
          type: string
          enum: [confirmed, completed, cancelled, no_show]
        zoom_join_url: { type: string, nullable: true }
        zoom_start_url: { type: string, nullable: true }
        booking_token: { type: string }
        notes: { type: string, nullable: true }
        broker_notes: { type: string, nullable: true }
        created_at: { type: string, format: date-time }

# ─── Paths ────────────────────────────────────────────────────────────────────
paths:
  # ── Health ──────────────────────────────────────────────────────────────────
  /health:
    get:
      tags: [Health]
      summary: Health check
      description: Returns 200 with server status. Used by load balancers and uptime monitors.
      responses:
        "200":
          description: Server is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: ok }

  /ping:
    get:
      tags: [Health]
      summary: Ping
      description: Simple liveness ping.
      responses:
        "200":
          description: Pong
          content:
            application/json:
              schema:
                type: object
                properties:
                  message: { type: string, example: pong }

  # ── Admin Auth ───────────────────────────────────────────────────────────────
  /admin/auth/send-code:
    post:
      tags: [Admin Auth]
      summary: Send OTP to broker email or phone
      description: Sends a one-time 6-digit code via email or SMS. The broker must already exist in the `brokers` table.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string
                  format: email
                delivery_method:
                  type: string
                  enum: [email, sms]
                  default: email
      responses:
        "200":
          description: Code sent successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      message: { type: string }
        "400":
          description: Invalid email or broker not found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

  /admin/auth/verify-code:
    post:
      tags: [Admin Auth]
      summary: Verify OTP and create broker session
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, code]
              properties:
                email: { type: string, format: email }
                code:
                  type: string
                  description: 6-digit numeric code
                  example: "123456"
      responses:
        "200":
          description: Authenticated — returns session token and user
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      sessionToken: { type: string }
                      user: { $ref: "#/components/schemas/BrokerUser" }
        "401":
          description: Invalid or expired code
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

  /admin/auth/validate:
    get:
      tags: [Admin Auth]
      summary: Validate existing broker session
      description: Called on app boot to verify a stored token is still valid.
      security:
        - BrokerAuth: []
      responses:
        "200":
          description: Session valid
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      user: { $ref: "#/components/schemas/BrokerUser" }
        "401":
          description: Session invalid or expired
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

  /admin/auth/logout:
    post:
      tags: [Admin Auth]
      summary: Logout broker session
      security:
        - BrokerAuth: []
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SuccessResponse" }

  # ── Client Auth ──────────────────────────────────────────────────────────────
  /client/auth/send-code:
    post:
      tags: [Client Auth]
      summary: Send OTP to client email or phone
      description: |
        Sends a 6-digit OTP. If the email is not found in the `client_users` table,
        the response sets `shouldRedirectToWizard: true` and the UI redirects to `/wizard`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email: { type: string, format: email }
                delivery_method:
                  type: string
                  enum: [email, sms]
                  default: email
      responses:
        "200":
          description: Code sent or redirect flag set
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      shouldRedirectToWizard:
                        type: boolean
                        description: True when the email is not registered — redirect to onboarding wizard
        "400":
          description: Invalid request
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

  /client/auth/verify-code:
    post:
      tags: [Client Auth]
      summary: Verify OTP and create client session
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, code]
              properties:
                email: { type: string, format: email }
                code:
                  type: string
                  pattern: '^\d{6}$'
                  example: "489201"
      responses:
        "200":
          description: Authenticated — returns session token
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      sessionToken: { type: string }
                      client: { $ref: "#/components/schemas/ClientInfo" }
        "401":
          description: Invalid code
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

  /client/auth/validate:
    get:
      tags: [Client Auth]
      summary: Validate existing client session
      security:
        - ClientAuth: []
      responses:
        "200":
          description: Session valid
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      client: { $ref: "#/components/schemas/ClientInfo" }
        "401":
          description: Invalid or expired session
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

  /client/auth/logout:
    post:
      tags: [Client Auth]
      summary: Logout client session
      security:
        - ClientAuth: []
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SuccessResponse" }

  # ── Admin Bootstrap ──────────────────────────────────────────────────────────
  /admin/init:
    get:
      tags: [Admin Bootstrap]
      summary: Single bootstrap call on admin load
      description: |
        Validates session, returns broker profile + all section controls in a single request.
        Called by `initAdminSession()` thunk on every admin page mount.
      security:
        - BrokerAuth: []
      responses:
        "200":
          description: Bootstrap data
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      profile:
                        type: object
                        description: Broker profile details
                      controls:
                        type: array
                        items:
                          { $ref: "#/components/schemas/AdminSectionControl" }
        "401":
          description: Unauthorized
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

  /admin/section-controls:
    get:
      tags: [Admin Bootstrap]
      summary: Get all section controls for the tenant
      security:
        - BrokerAuth: []
      responses:
        "200":
          description: Section controls list
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      controls:
                        type: array
                        items:
                          { $ref: "#/components/schemas/AdminSectionControl" }
    put:
      tags: [Admin Bootstrap]
      summary: Bulk update section controls
      description: Enable or disable sidebar sections and set tooltip messages.
      security:
        - BrokerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [controls]
              properties:
                controls:
                  type: array
                  items:
                    type: object
                    required: [section_id, is_disabled]
                    properties:
                      section_id: { type: string, example: "pipeline" }
                      is_disabled: { type: boolean }
                      tooltip_message: { type: string, example: "Coming Soon" }
      responses:
        "200":
          description: Updated successfully
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SuccessResponse" }

  # ── Admin Profile ─────────────────────────────────────────────────────────────
  /admin/profile:
    get:
      tags: [Admin Profile]
      summary: Get authenticated broker's own profile
      security:
        - BrokerAuth: []
      responses:
        "200":
          description: Broker profile
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      profile: { $ref: "#/components/schemas/BrokerUser" }
    put:
      tags: [Admin Profile]
      summary: Update authenticated broker's profile
      security:
        - BrokerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                first_name: { type: string }
                last_name: { type: string }
                phone: { type: string }
                license_number: { type: string }
                bio: { type: string }
                office_address: { type: string }
                office_city: { type: string }
                office_state: { type: string }
                office_zip: { type: string }
                years_experience: { type: integer }
                specializations:
                  type: array
                  items: { type: string }
      responses:
        "200":
          description: Profile updated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SuccessResponse" }

  /admin/profile/avatar:
    put:
      tags: [Admin Profile]
      summary: Update broker avatar URL
      security:
        - BrokerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [avatar_url]
              properties:
                avatar_url: { type: string, format: uri }
      responses:
        "200":
          description: Avatar updated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SuccessResponse" }

  # ── Broker Share Link ─────────────────────────────────────────────────────────
  /brokers/my-share-link:
    get:
      tags: [Brokers]
      summary: Get authenticated broker's share link
      security:
        - BrokerAuth: []
      responses:
        "200":
          description: Share link info
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      share_url: { type: string }
                      public_token: { type: string }

  /brokers/my-share-link/regenerate:
    post:
      tags: [Brokers]
      summary: Regenerate broker's public token (new share link)
      security:
        - BrokerAuth: []
      responses:
        "200":
          description: New share link
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      share_url: { type: string }
                      public_token: { type: string }

  /brokers/my-share-link/email:
    post:
      tags: [Brokers]
      summary: Email the share link to a recipient
      security:
        - BrokerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [recipient_email]
              properties:
                recipient_email: { type: string, format: email }
                recipient_name: { type: string }
      responses:
        "200":
          description: Email sent
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SuccessResponse" }

  # ── Dashboard ────────────────────────────────────────────────────────────────
  /dashboard/stats:
    get:
      tags: [Dashboard]
      summary: Overview dashboard stats
      security:
        - BrokerAuth: []
      responses:
        "200":
          description: Aggregate statistics
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      stats: { type: object }

  /dashboard/broker-metrics:
    get:
      tags: [Dashboard]
      summary: Current period broker metrics
      security:
        - BrokerAuth: []
      responses:
        "200":
          description: Broker metrics
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      metrics: { type: object }
    put:
      tags: [Dashboard]
      summary: Update broker metrics goals/actuals
      security:
        - BrokerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: Metrics fields to update
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SuccessResponse" }

  /dashboard/broker-metrics/annual:
    get:
      tags: [Dashboard]
      summary: Annual broker performance metrics
      security:
        - BrokerAuth: []
      responses:
        "200":
          description: Annual metrics by month
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      annual: { type: array, items: { type: object } }

  # ── Loans ────────────────────────────────────────────────────────────────────
  /loans:
    get:
      tags: [Loans]
      summary: List all loan applications
      security:
        - BrokerAuth: []
      parameters:
        - in: query
          name: status
          schema: { type: string }
          description: Filter by loan status
        - in: query
          name: broker_id
          schema: { type: integer }
          description: Filter by assigned broker (admin only)
      responses:
        "200":
          description: Loan list
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      loans:
                        type: array
                        items: { $ref: "#/components/schemas/LoanApplication" }
                      total: { type: integer }

  /loans/create:
    post:
      tags: [Loans]
      summary: Create a new loan application (admin)
      security:
        - BrokerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [client_user_id, loan_type, loan_amount]
              properties:
                client_user_id: { type: integer }
                loan_type: { type: string }
                loan_amount: { type: number }
                property_value: { type: number }
                property_address: { type: string }
                property_city: { type: string }
                property_state: { type: string }
                property_zip: { type: string }
                notes: { type: string }
      responses:
        "201":
          description: Loan created
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      loan: { $ref: "#/components/schemas/LoanApplication" }

  /loans/{loanId}:
    get:
      tags: [Loans]
      summary: Get loan details
      security:
        - BrokerAuth: []
      parameters:
        - in: path
          name: loanId
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Loan detail
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      loan: { $ref: "#/components/schemas/LoanApplication" }
        "404":
          description: Loan not found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

  /loans/{loanId}/assign-broker:
    patch:
      tags: [Loans]
      summary: Assign primary broker to a loan
      security:
        - BrokerAuth: []
      parameters:
        - in: path
          name: loanId
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [broker_id]
              properties:
                broker_id: { type: integer }
      responses:
        "200":
          description: Broker assigned
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SuccessResponse" }

  /loans/{loanId}/assign-partner:
    patch:
      tags: [Loans]
      summary: Assign partner (Realtor) broker to a loan
      security:
        - BrokerAuth: []
      parameters:
        - in: path
          name: loanId
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [partner_broker_id]
              properties:
                partner_broker_id: { type: integer, nullable: true }
      responses:
        "200":
          description: Partner assigned
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SuccessResponse" }

  /loans/{loanId}/status:
    patch:
      tags: [Loans]
      summary: Update loan status
      security:
        - BrokerAuth: []
