  # ── Loans ────────────────────────────────────────────────────────────────────
  /loans:
    get:
      tags: [Loans]
      summary: List all loan applications
      security:
        - BrokerAuth: []
      parameters:
        - in: query
          name: status
          schema: { type: string }
          description: Filter by loan status
        - in: query
          name: broker_id
          schema: { type: integer }
          description: Filter by assigned broker (admin only)
      responses:
        "200":
          description: Loan list
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      loans:
                        type: array
                        items: { $ref: "#/components/schemas/LoanApplication" }
                      total: { type: integer }

  /loans/create:
    post:
      tags: [Loans]
      summary: Create a new loan application (Mortgage Banker / platform owner)
      description: |
        Requires `admin` or `platform_owner` role. Partners must use share-link / public apply flows.

        `broker_user_id` (optional): platform owner may assign the loan to another active mortgage banker;
        defaults to the session broker. Mortgage bankers always create under themselves.
      security:
        - BrokerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - client_email
                - client_first_name
                - client_last_name
                - client_phone
                - loan_type
                - loan_amount
                - property_value
                - down_payment
                - property_address
                - property_city
                - property_state
                - property_zip
                - property_type
              properties:
                broker_user_id:
                  type: integer
                  nullable: true
                  description: Platform owner only — assign loan to another MB
                client_email: { type: string, format: email }
                client_first_name: { type: string }
                client_last_name: { type: string }
                client_phone: { type: string }
                loan_type: { type: string, enum: [purchase, refinance] }
                loan_amount: { type: number }
                property_value: { type: number }
                down_payment: { type: number }
                property_address: { type: string }
                property_city: { type: string }
                property_state: { type: string }
                property_zip: { type: string }
                property_type: { type: string }
                notes: { type: string }
      responses:
        "201":
          description: Loan created
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      application_id: { type: integer }
                      application_number: { type: string }
        "403":
          description: Partner role or client owned by another broker
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

  /loans/{loanId}:
    get:
      tags: [Loans]
      summary: Get loan details
      security:
        - BrokerAuth: []
      parameters:
        - in: path
          name: loanId
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Loan detail
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      loan: { $ref: "#/components/schemas/LoanApplication" }
        "404":
          description: Loan not found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

  /loans/{loanId}/assign-broker:
    patch:
      tags: [Loans]
      summary: Assign primary broker to a loan
      security:
        - BrokerAuth: []
      parameters:
