  # ── Public Apply ──────────────────────────────────────────────────────────────
  /apply:
    post:
      tags: [Public]
      summary: Submit a loan application from the public wizard
      description: Creates a client account (if new) and a loan application. No auth required.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [first_name, last_name, email, loan_type, loan_amount]
              properties:
                first_name: { type: string }
                last_name: { type: string }
                email: { type: string, format: email }
                phone: { type: string }
                loan_type: { type: string }
                loan_amount: { type: number }
                property_value: { type: number }
                property_address: { type: string }
                citizenship_status: { type: string }
                broker_token:
                  type: string
                  description: Optional — pre-assigns a specific broker's share link token
                draft_id:
                  type: integer
                  description: Optional — if provided, promotes the existing draft application instead of creating a new record (prevents duplicates)
      responses:
        "201":
          description: Application submitted
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      application_id: { type: integer }
                      client_id: { type: integer }
        "400":
          description: Validation error
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

  /apply/draft:
    post:
      tags: [Public]
      summary: Save or update a wizard draft application
      description: >
        Creates or updates a draft loan application from the public wizard.
        Minimum required: first_name, last_name, email.
        If draft_id is supplied and matches an existing draft for this client it performs an UPDATE,
        otherwise a new draft record is inserted. No authentication required.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [first_name, last_name, email]
              properties:
                draft_id:
                  {
                    type: integer,
                    description: "ID of an existing draft to update",
                  }
                first_name: { type: string }
                last_name: { type: string }
                email: { type: string, format: email }
                phone: { type: string }
                address_street: { type: string }
                address_city: { type: string }
                address_state: { type: string }
                address_zip: { type: string }
                loan_type: { type: string }
                property_value: { type: number }
                down_payment: { type: number }
                property_type: { type: string }
                property_address: { type: string }
                property_city: { type: string }
                property_state: { type: string }
                property_zip: { type: string }
                loan_purpose: { type: string }
                citizenship_status: { type: string }
                broker_token: { type: string }
                wizard_step:
                  { type: integer, description: "Current wizard step (1-5)" }
      responses:
        "200":
          description: Draft saved
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      draft_id: { type: integer }
                      application_number: { type: string }
        "400":
          description: Validation error
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

  # ── Public Broker Info ────────────────────────────────────────────────────────
  /public/broker/{token}:
    get:
      tags: [Public]
      summary: Get public broker info by share token
      description: Used by the application wizard to pre-load the referring broker's info.
      parameters:
        - in: path
          name: token
          required: true
          schema: { type: string }
          description: Broker's `public_token` UUID
      responses:
        "200":
          description: Public broker profile
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      broker:
                        type: object
                        properties:
                          id: { type: integer }
                          first_name: { type: string }
                          last_name: { type: string }
                          avatar_url: { type: string, nullable: true }
        "404":
          description: Broker not found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

  # ── Clients ────────────────────────────────────────────────────────────────────
  /clients:
    get:
      tags: [Clients]
      summary: List all clients
      security:
        - BrokerAuth: []
      parameters:
        - in: query
          name: search
          schema: { type: string }
        - in: query
          name: page
          schema: { type: integer, default: 1 }
        - in: query
          name: limit
          schema: { type: integer, default: 20 }
      responses:
        "200":
          description: Client list
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      clients:
                        type: array
                        items: { $ref: "#/components/schemas/ClientInfo" }
                      total: { type: integer }
    post:
      tags: [Clients]
      summary: Create a new client profile
      security:
        - BrokerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [first_name, last_name]
              properties:
                first_name: { type: string }
                middle_name: { type: string }
                last_name: { type: string }
                email: { type: string, format: email }
                phone: { type: string }
                address_street: { type: string }
                address_unit: { type: string }
                address_city: { type: string }
                address_state: { type: string }
                address_zip: { type: string }
      responses:
        "201":
          description: Client created
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      client: { $ref: "#/components/schemas/ClientInfo" }
        "400":
          description: Missing required fields
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
        "409":
          description: Email already exists
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

  /clients/{clientId}:
    delete:
      tags: [Clients]
      summary: Delete a client record
      security:
        - BrokerAuth: []
      parameters:
        - in: path
          name: clientId
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SuccessResponse" }
    put:
      tags: [Clients]
      summary: Update client profile fields
      security:
        - BrokerAuth: []
      parameters:
        - in: path
          name: clientId
          required: true
          schema: { type: integer }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                first_name: { type: string }
                last_name: { type: string }
                phone: { type: string }
                alternate_phone: { type: string }
                date_of_birth: { type: string, format: date }
                address_street: { type: string }
                address_city: { type: string }
                address_state: { type: string }
                address_zip: { type: string }
                employment_status: { type: string }
                income_type:
                  {
                    type: string,
                    enum: [W-2, 1099, Self-Employed, Investor, Mixed],
                  }
                annual_income: { type: number }
                credit_score: { type: integer }
                citizenship_status:
                  {
                    type: string,
                    enum: [us_citizen, permanent_resident, non_resident, other],
                  }
                source: { type: string }
      responses:
        "200":
          description: Updated client

  /clients/{clientId}/profile:
    get:
      tags: [Clients]
      summary: Get full client profile with loans, conversations, and activity
      security:
        - BrokerAuth: []
      parameters:
        - in: path
          name: clientId
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Full client profile
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  client:
                    type: object
                    properties:
                      id: { type: integer }
                      first_name: { type: string }
                      last_name: { type: string }
                      email: { type: string }
                      phone: { type: string }
                      alternate_phone: { type: string }
                      date_of_birth: { type: string }
                      address_street: { type: string }
                      address_city: { type: string }
                      address_state: { type: string }
                      address_zip: { type: string }
                      employment_status: { type: string }
                      income_type: { type: string }
                      annual_income: { type: number }
                      credit_score: { type: integer }
                      citizenship_status: { type: string }
                      status: { type: string }
                      source: { type: string }
                      created_at: { type: string }
                      assigned_broker: { type: object }
                  loans: { type: array, items: { type: object } }
                  conversations: { type: array, items: { type: object } }
                  communications: { type: array, items: { type: object } }

  # ── Voice / Calling ──────────────────────────────────────────────────────────
  /voice/token:
    post:
      tags: [Voice]
      summary: Generate Twilio Access Token for browser Voice SDK
      security:
        - BrokerAuth: []
      responses:
        "200":
          description: Access token
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  token: { type: string }

  /voice/twiml:
    post:
      tags: [Voice]
      summary: TwiML webhook called by Twilio to route outbound calls
      description: No authentication required — called by Twilio servers
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                To: { type: string, description: Destination phone number }
                From:
                  type: string
                  description: Browser SDK identity, e.g. client:broker_270004
                Identity:
                  type: string
                  description: Legacy/alternate identity field (broker_{id})
                CallSid: { type: string }
      responses:
        "200":
          description: TwiML response
          content:
            text/xml:
              schema: { type: string }

  /voice/incoming:
    post:
      tags: [Voice]
      summary: TwiML webhook for inbound calls (Twilio → server)
      description: |
        Called by Twilio when an external caller dials a configured number.
        Routes simultaneously to all available (voice_available=1) brokers.
        Falls back to the assigned broker or first active broker if none is available.
        No authentication required — called by Twilio servers.
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                From: { type: string, description: Caller's phone number }
                To:
                  { type: string, description: Twilio number that was dialled }
                CallSid: { type: string }
      responses:
        "200":
          description: TwiML response
          content:
            text/xml:
              schema: { type: string }

  /voice/availability:
    post:
      tags: [Voice]
      summary: Update broker voice availability (online/offline toggle)
      description: |
        Called by the CRM frontend when the banker toggles Available / Unavailable.
        Updates voice_available on the brokers table so inbound call routing
        can ring only the bankers who are currently online.
      security:
        - BrokerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [available]
              properties:
                available:
                  type: boolean
                  description: true = broker is online and can receive inbound calls
      responses:
        "200":
          description: Availability updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  available: { type: boolean }

  /voice/voicemail-settings:
    get:
      tags: [Voice]
      summary: Get voicemail overrides for the authenticated broker plus tenant defaults
      security:
        - BrokerAuth: []
      responses:
        "200":
          description: Voicemail settings
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  broker:
                    type: object
                    properties:
                      voicemail_enabled:
                        type: boolean
                        nullable: true
                        description: null = inherit tenant default
                      voicemail_greeting_text: { type: string, nullable: true }
                      voicemail_greeting_url: { type: string, nullable: true }
                      has_personal_line: { type: boolean }
                  tenant:
                    type: object
                    properties:
                      voicemail_enabled: { type: boolean }
                      voicemail_greeting_text: { type: string, nullable: true }
                      voicemail_greeting_url: { type: string, nullable: true }
                      voicemail_max_seconds: { type: integer }
                      voicemail_transcribe: { type: boolean }
    put:
      tags: [Voice]
      summary: Update the authenticated broker's voicemail overrides
      description: Pass null on any field to clear the override and inherit the tenant default.
      security:
        - BrokerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                enabled: { type: boolean, nullable: true }
                greeting_text: { type: string, nullable: true }
                greeting_url: { type: string, nullable: true }
      responses:
        "200":
          description: Saved
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SuccessResponse" }

  /voice/voicemail-settings/tenant:
    put:
      tags: [Voice]
      summary: Update tenant-level voicemail defaults (admin only)
      security:
        - BrokerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                enabled: { type: boolean }
                greeting_text: { type: string, nullable: true }
                greeting_url: { type: string, nullable: true }
                max_seconds: { type: integer, minimum: 10, maximum: 600 }
                transcribe: { type: boolean }
      responses:
        "200":
          description: Saved
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SuccessResponse" }
        "403":
          description: Admin access required

  /voice/voicemail-complete:
    post:
      tags: [Voice]
      summary: TwiML callback fired by Twilio when caller finishes recording a voicemail
      description: No authentication required — called by Twilio servers.
      responses:
        "200":
          description: TwiML goodbye response
          content:
            text/xml:
              schema: { type: string }

  /voice/voicemail-recording:
    post:
      tags: [Voice]
      summary: Twilio recordingStatusCallback for the voicemail Record verb
      description: |
        Inserts a new communications row with is_voicemail = 1 and broadcasts
        an Ably event. No authentication required — called by Twilio servers.
      responses:
        "204":
          description: Recording stored

  /voice/voicemail-transcription:
    post:
      tags: [Voice]
      summary: Twilio transcribeCallback for voicemail audio
      description: |
        Patches the matching voicemail communications row with the transcript.
        No authentication required — called by Twilio servers.
      responses:
        "204":
          description: Transcription saved

  /voice/phone-numbers:
    get:
      tags: [Voice]
      summary: List Twilio phone numbers with webhook status and broker assignments
    get:
      tags: [Voice]
      summary: List Twilio phone numbers with webhook status and broker assignments
      security:
        - BrokerAuth: []
      responses:
        "200":
          description: Phone numbers list with assignment info
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  incomingUrl: { type: string }
                  numbers:
                    type: array
                    items:
                      type: object
                      properties:
                        sid: { type: string }
                        phoneNumber: { type: string }
                        friendlyName: { type: string }
                        voiceUrl: { type: string }
                        configured: { type: boolean }
                        capabilities:
                          type: object
                          properties:
                            voice: { type: boolean }
                            sms: { type: boolean }
                            mms: { type: boolean }
                        assignedBrokerId: { type: integer, nullable: true }
                        assignedBrokerName: { type: string, nullable: true }
                  brokers:
                    type: array
                    description: Active brokers for the assign dropdown
                    items:
                      type: object
                      properties:
                        id: { type: integer }
                        name: { type: string }

  /voice/phone-numbers/{sid}/configure:
    post:
      tags: [Voice]
      summary: Point a Twilio number's voice webhook to this portal
      security:
        - BrokerAuth: []
      parameters:
        - in: path
          name: sid
          required: true
          schema: { type: string }
          description: Twilio IncomingPhoneNumber SID, or "all" to configure every number
      responses:
        "200":
          description: Webhook updated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SuccessResponse" }

  /voice/phone-numbers/{sid}/assign:
    post:
      tags: [Voice]
      summary: Assign (or unassign) a Twilio phone number to a specific mortgage banker
      description: |
        Sets twilio_phone_sid and twilio_caller_id on the broker row.
        The assigned broker rings first on inbound calls and their number appears as
        caller ID on outbound calls. Pass brokerId: null to unassign.
      security:
        - BrokerAuth: []
      parameters:
        - in: path
          name: sid
          required: true
          schema: { type: string }
          description: Twilio IncomingPhoneNumber SID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [brokerId]
              properties:
                brokerId:
                  type: integer
                  nullable: true
                  description: Broker ID to assign, or null to unassign
      responses:
        "200":
          description: Assignment saved
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  sid: { type: string }
                  brokerId: { type: integer, nullable: true }
                  callerIdE164: { type: string }

  /voice/log:
    post:
      tags: [Voice]
      summary: Log a completed call to the communications table
      security:
        - BrokerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [phone]
              properties:
                phone: { type: string }
                client_id: { type: integer }
                application_id: { type: integer }
                duration: { type: integer, description: Duration in seconds }
                call_status: { type: string }
                call_sid: { type: string }
                client_name: { type: string }
                direction:
                  type: string
                  enum: [inbound, outbound]
                  description: Call direction (defaults to outbound)
      responses:
        "200":
          description: Call logged
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SuccessResponse" }

  /voice/calls:
    get:
      tags: [Voice]
      summary: Get paginated call history for the authenticated broker
      security:
        - BrokerAuth: []
      parameters:
        - name: page
          in: query
          schema: { type: integer, default: 1 }
        - name: limit
          in: query
          schema: { type: integer, default: 50, maximum: 100 }
      responses:
        "200":
          description: Call history list
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  calls:
                    type: array
                    items:
                      type: object
                      properties:
                        id: { type: integer }
                        direction: { type: string, enum: [inbound, outbound] }
                        body: { type: string }
                        status: { type: string }
                        external_id: { type: string, nullable: true }
                        conversation_id: { type: string, nullable: true }
                        client_name: { type: string, nullable: true }
                        client_phone: { type: string, nullable: true }
                        client_id: { type: integer, nullable: true }
                        created_at: { type: string, format: date-time }
                        sent_at:
                          { type: string, format: date-time, nullable: true }
                  pagination:
                    type: object
                    properties:
                      page: { type: integer }
                      limit: { type: integer }
                      total: { type: integer }
                      totalPages: { type: integer }

  /conversations/lookup-contact:
    get:
      tags: [Conversations]
      summary: Look up a client by phone number (used for resolving incoming call caller identity)
      security:
        - BrokerAuth: []
      parameters:
        - name: phone
          in: query
          required: true
          schema: { type: string }
          description: E.164 or local phone number to look up
      responses:
        "200":
          description: Contact lookup result
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  found: { type: boolean }
                  client_id: { type: integer }
                  client_name: { type: string }
                  phone: { type: string }

  # ── Brokers ───────────────────────────────────────────────────────────────────
  /brokers:
    get:
      tags: [Brokers]
      summary: List brokers / team members (scoped)
      description: |
        Default (no `scope`): **platform owner only** — full tenant directory.

        `scope=realtors`: **admin** or **platform owner** — partner realtors.
        Mortgage bankers see only rows where `created_by_broker_id` equals their broker id;
        platform owners see all staff.

        `scope=mortgage-bankers`: **admin** or **platform owner** — active mortgage bankers
        and platform owners (dropdowns for partner assignment).
      security:
        - BrokerAuth: []
      parameters:
        - in: query
          name: scope
          schema:
            type: string
            enum: [realtors, mortgage-bankers]
          description: Optional list scope (see description above)
        - in: query
          name: page
          schema: { type: integer, minimum: 1, default: 1 }
        - in: query
          name: limit
          schema: { type: integer, minimum: 1, maximum: 100, default: 30 }
        - in: query
          name: search
          schema: { type: string }
        - in: query
          name: role
          schema:
            type: string
            enum: [broker, admin, platform_owner]
        - in: query
          name: sortBy
          schema:
            type: string
            enum: [first_name, last_name, email, role, status, license_number]
        - in: query
          name: sortOrder
          schema:
            type: string
            enum: [ASC, DESC]
      responses:
        "200":
          description: Broker list
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      brokers:
                        type: array
                        items: { $ref: "#/components/schemas/BrokerUser" }
    post:
      tags: [Brokers]
      summary: Create a new broker / invite a partner
      description: |
        **Mortgage bankers** (`admin`) and **platform owners** may create brokers.
        Mortgage bankers always create **Partner** realtors owned by themselves (`created_by_broker_id` forced to session broker).
        Platform owners may set `role: "broker"` (Partner) or `role: "admin"` (Mortgage Banker).
      security:
        - BrokerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, first_name, last_name, role]
              properties:
                email: { type: string, format: email }
                first_name: { type: string }
                last_name: { type: string }
                phone: { type: string }
                role:
                  type: string
                  enum: [admin, broker]
                license_number: { type: string }
      responses:
        "201":
          description: Broker created
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      broker: { $ref: "#/components/schemas/BrokerUser" }

  /brokers/{brokerId}:
    put:
      tags: [Brokers]
      summary: Update a broker record
      security:
        - BrokerAuth: []
      parameters:
        - in: path
          name: brokerId
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                first_name: { type: string }
                last_name: { type: string }
                phone: { type: string }
                status:
                  type: string
                  enum: [active, inactive, suspended]
                license_number: { type: string }
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SuccessResponse" }
    delete:
      tags: [Brokers]
      summary: Delete a broker
      security:
        - BrokerAuth: []
      parameters:
        - in: path
          name: brokerId
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SuccessResponse" }

  /brokers/{brokerId}/share-link:
    get:
      tags: [Brokers]
      summary: Get share link for a specific broker (admin management)
      security:
        - BrokerAuth: []
      parameters:
        - in: path
          name: brokerId
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Share link
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      share_url: { type: string }

  /brokers/{brokerId}/profile:
    get:
      tags: [Brokers]
      summary: Get a broker's profile (admin view)
      security:
        - BrokerAuth: []
      parameters:
        - in: path
          name: brokerId
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Profile
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      profile: { $ref: "#/components/schemas/BrokerUser" }
    put:
      tags: [Brokers]
      summary: Update a broker's profile (admin management)
      security:
        - BrokerAuth: []
      parameters:
        - in: path
          name: brokerId
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                bio: { type: string }
                years_experience: { type: integer }
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SuccessResponse" }

  /brokers/{brokerId}/sms-opt-in:
    patch:
      tags: [Brokers]
      summary: Update a broker's SMS broadcast opt-in status (admin only)
      security:
        - BrokerAuth: []
      parameters:
        - in: path
          name: brokerId
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [sms_blast_opted_in]
              properties:
                sms_blast_opted_in:
                  type: integer
                  nullable: true
                  enum: [0, 1, null]
                  description: "0=opted-out, 1=opted-in, null=unknown/reset"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      sms_blast_opted_in:
                        type: integer
                        nullable: true

  /brokers/{brokerId}/avatar:
    put:
      tags: [Brokers]
      summary: Update a broker's avatar (admin management)
      security:
        - BrokerAuth: []
      parameters:
        - in: path
          name: brokerId
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [avatar_url]
              properties:
                avatar_url: { type: string, format: uri }
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SuccessResponse" }

  # ── Tasks ─────────────────────────────────────────────────────────────────────
  /tasks:
    get:
      tags: [Tasks]
      summary: List task templates
      security:
        - BrokerAuth: []
      responses:
        "200":
          description: Task templates
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      tasks:
                        type: array
                        items: { $ref: "#/components/schemas/Task" }
    post:
      tags: [Tasks]
      summary: Create a task template
      security:
        - BrokerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [title]
              properties:
                title: { type: string }
                description: { type: string }
                due_days: { type: integer }
      responses:
        "201":
          description: Created
          content:
            application/json:
