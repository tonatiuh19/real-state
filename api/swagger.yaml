  /conversations/threads:
    get:
      tags: [Conversations]
      summary: List conversation threads
      security:
        - BrokerAuth: []
      parameters:
        - in: query
          name: search
          schema: { type: string }
        - in: query
          name: channel
          schema: { type: string, enum: [email, sms, whatsapp] }
        - in: query
          name: include_broadcast
          schema: { type: boolean, default: false }
          description: Include broadcast-generated threads (persisted `broadcast_hidden` tag and legacy `broadcast-*` ids). Defaults to false for normal inbox UX.
      responses:
        "200":
          description: Threads
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      threads:
                        type: array
                        items:
                          type: object
                          properties:
                            client_assigned_broker_name:
                              type: string
                              nullable: true
                              description: >
                                Set when the contact's formal assigned broker differs from
                                the broker who owns this conversation thread (e.g. an inbound
                                call/SMS landed on a different broker's personal line).
                                Null when no mismatch.
                            client_assigned_broker_id:
                              type: integer
                              nullable: true
                              description: >
                                broker_id of the contact's formally assigned broker.
                                Mirrors clients.assigned_broker_id. Null when no mismatch.
                            thread_type:
                              type: string
                              enum: [direct, group]
                            display_title:
                              type: string
                              nullable: true
                            participant_count:
                              type: integer
                            creation_source:
                              type: string
                              enum: [encore, phone_synced]
                            channel:
                              type: string
                              enum: [sms, whatsapp, internal]

