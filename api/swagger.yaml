  /reminder-flow-executions:
    get:
      tags: [Reminder Flows]
      summary: List reminder flow execution history
      security:
        - BrokerAuth: []
      responses:
        "200":
          description: Executions
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      executions: { type: array, items: { type: object } }

  /reminder-flow-executions/{executionId}/respond:
    post:
      tags: [Reminder Flows]
      summary: Mark a flow execution as responded (stops further messages)
      security:
        - BrokerAuth: []
      parameters:
        - in: path
          name: executionId
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Marked responded
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SuccessResponse" }

  # ── Scheduler (Public) ────────────────────────────────────────────────────────
  /public/scheduler:
    get:
      tags: [Scheduler (Public)]
      summary: Get default broker's scheduler info and available dates
      description: Used by the public booking page when no broker token is specified.
      responses:
        "200":
          description: Scheduler info and available dates
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      broker: { type: object }
                      available_dates:
                        type: array
                        items: { type: string, format: date }

  /public/scheduler/{token}:
    get:
      tags: [Scheduler (Public)]
      summary: Get specific broker's scheduler info and available dates by public token
      parameters:
        - in: path
          name: token
          required: true
          schema: { type: string }
          description: Broker's `public_token`
      responses:
        "200":
          description: Scheduler info and available dates
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      broker: { type: object }
                      available_dates:
                        type: array
                        items: { type: string, format: date }
        "404":
          description: Broker not found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

  /public/scheduler/{token}/slots:
    get:
      tags: [Scheduler (Public)]
      summary: Get available time slots for a specific date
      parameters:
        - in: path
          name: token
          required: true
          schema: { type: string }
          description: Broker's `public_token` or `"default"`
        - in: query
          name: date
          required: true
          schema: { type: string, format: date }
          description: Date in YYYY-MM-DD format
      responses:
        "200":
          description: Available slots
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      slots:
                        type: array
                        items:
                          type: object
                          properties:
                            time: { type: string, example: "14:00" }
                            end_time: { type: string, example: "14:30" }
                            available: { type: boolean }

  /public/scheduler/book:
    post:
      tags: [Scheduler (Public)]
      summary: Book a meeting slot
      description: |
        Creates a confirmed meeting. Sends confirmation email to client and notification to broker.
        Creates a Zoom meeting automatically if `meeting_type: "video"` and Zoom credentials are configured.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                [
                  broker_token,
                  client_name,
                  client_email,
                  meeting_date,
                  meeting_time,
                  meeting_type,
                ]
              properties:
                broker_token:
                  type: string
                  description: Broker's `public_token` or `"default"`
                client_name: { type: string }
                client_email: { type: string, format: email }
                client_phone: { type: string }
                meeting_date: { type: string, format: date }
                meeting_time:
                  type: string
                  example: "14:00"
                  description: HH:MM format
                meeting_type:
                  type: string
                  enum: [phone, video]
                notes: { type: string }
      responses:
        "200":
          description: Meeting booked
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      meeting_id: { type: integer }
                      booking_token: { type: string }
                      zoom_join_url: { type: string, nullable: true }
                      zoom_start_url: { type: string, nullable: true }
                      meeting_date: { type: string, format: date }
                      meeting_time: { type: string }
                      meeting_type: { type: string }
                      broker_name: { type: string }
        "400":
          description: Slot unavailable or validation error
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
        "409":
          description: Slot already taken
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

  /public/scheduler/cancel/{bookingToken}:
    post:
      tags: [Scheduler (Public)]
      summary: Cancel a meeting by booking token
      description: Client-facing cancellation. Sends cancellation emails to both parties.
      parameters:
        - in: path
          name: bookingToken
          required: true
          schema: { type: string }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                reason: { type: string }
      responses:
        "200":
          description: Cancelled
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SuccessResponse" }
        "404":
          description: Meeting not found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

  # ── Scheduler (Admin) ─────────────────────────────────────────────────────────
  /scheduler/settings:
    get:
      tags: [Scheduler (Admin)]
      summary: Get broker's scheduler settings and availability
      security:
        - BrokerAuth: []
      responses:
        "200":
          description: Settings and availability
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      settings: { type: object }
                      availability: { type: array, items: { type: object } }
    put:
      tags: [Scheduler (Admin)]
      summary: Update scheduler settings and availability windows
      security:
        - BrokerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                is_enabled: { type: boolean }
                meeting_title: { type: string }
                meeting_description: { type: string }
                slot_duration_minutes: { type: integer, example: 30 }
                buffer_time_minutes: { type: integer, example: 15 }
                advance_booking_days: { type: integer, example: 30 }
                min_booking_hours: { type: integer, example: 2 }
                timezone: { type: string, example: "America/Chicago" }
                allow_phone: { type: boolean }
                allow_video: { type: boolean }
                availability:
                  type: array
                  items:
                    type: object
                    properties:
                      day_of_week: { type: integer, minimum: 0, maximum: 6 }
                      start_time: { type: string, example: "09:00" }
                      end_time: { type: string, example: "17:00" }
                      is_active: { type: boolean }
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SuccessResponse" }

  /scheduler/meetings:
    get:
      tags: [Scheduler (Admin)]
      summary: List scheduled meetings
      description: Admins see all meetings; Partners only see their own.
      security:
        - BrokerAuth: []
      parameters:
        - in: query
          name: status
          schema:
            { type: string, enum: [confirmed, completed, cancelled, no_show] }
        - in: query
          name: from
          schema: { type: string, format: date }
        - in: query
          name: to
          schema: { type: string, format: date }
        - in: query
          name: broker_id
          schema: { type: integer }
          description: Filter by broker (admin only)
      responses:
        "200":
          description: Meetings list
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      meetings:
                        type: array
                        items: { $ref: "#/components/schemas/ScheduledMeeting" }
                      total: { type: integer }
    post:
      tags: [Scheduler (Admin)]
      summary: Create a meeting manually (admin)
      security:
        - BrokerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                [
                  client_name,
                  client_email,
                  meeting_date,
                  meeting_time,
                  meeting_type,
                ]
              properties:
                client_name: { type: string }
                client_email: { type: string, format: email }
                client_phone: { type: string }
                meeting_date: { type: string, format: date }
                meeting_time: { type: string, example: "10:00" }
                meeting_type: { type: string, enum: [phone, video] }
                notes: { type: string }
                target_broker_id:
                  type: integer
                  description: Assign to a specific broker (admin only)
      responses:
        "200":
          description: Created
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      meeting_id: { type: integer }
                      booking_token: { type: string }

  /scheduler/meetings/{meetingId}:
    put:
      tags: [Scheduler (Admin)]
      summary: Update a scheduled meeting (reschedule, cancel, add notes)
      security:
        - BrokerAuth: []
      parameters:
        - in: path
          name: meetingId
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  {
                    type: string,
                    enum: [confirmed, completed, cancelled, no_show],
                  }
                broker_notes: { type: string }
                meeting_date: { type: string, format: date }
                meeting_time: { type: string, example: "15:00" }
                meeting_type: { type: string, enum: [phone, video] }
                cancelled_reason: { type: string }
                cancelled_by: { type: string, enum: [client, broker] }
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SuccessResponse" }

  # ── Contact ───────────────────────────────────────────────────────────────────
  /contact:
    post:
      tags: [Contact]
      summary: Submit the public contact form
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, email, subject, message]
              properties:
                name: { type: string }
                email: { type: string, format: email }
                phone: { type: string }
                subject: { type: string }
                message: { type: string }
      responses:
        "201":
          description: Message received
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SuccessResponse" }
        "400":
          description: Missing required fields or invalid email
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
    get:
      tags: [Contact]
      summary: Get all contact form submissions (admin)
      security:
        - BrokerAuth: []
      responses:
        "200":
          description: Submissions
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      submissions: { type: array, items: { type: object } }

  # ── Proxy Utilities ───────────────────────────────────────────────────────────
  /proxy/pdf:
    get:
      tags: [Public]
      summary: Server-side PDF proxy (avoids CORS)
      description: Fetches a PDF from an external URL server-side and streams it to the browser. Used for PDF rendering in the client.
      parameters:
        - in: query
          name: url
          required: true
          schema: { type: string, format: uri }
      responses:
        "200":
          description: PDF stream
          content:
            application/pdf:
              schema:
                type: string
                format: binary
        "400":
          description: Invalid URL
        "502":
          description: Upstream error

  /image-proxy:
    get:
      tags: [Public]
      summary: Server-side image proxy (avoids CORS for PDF generation)
      description: Fetches an image from an external URL and forwards it. Cached for 24 hours. Used by jsPDF for embedding external images.
      parameters:
        - in: query
          name: url
          required: true
          schema: { type: string, format: uri }
      responses:
        "200":
          description: Image bytes
          content:
            image/*:
              schema:
                type: string
                format: binary
        "400":
          description: Invalid URL

  # ── Webhooks & Cron ───────────────────────────────────────────────────────────
  /webhooks/inbound-email:
    post:
      tags: [Webhooks & Cron]
      summary: Inbound email webhook (Postmark / Mailgun / SendGrid)
      description: |
        Receives inbound parsed emails from an email service provider and:
        1. Creates an inbound `communications` record.
        2. Upserts the `conversation_thread` via DB trigger.
        3. Marks any active `reminder_flow_executions` waiting on this
           conversation as responded so the cron can advance the flow.

        Protected by `INBOUND_WEBHOOK_SECRET` header — do NOT expose to public callers.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: Webhook payload (format varies by provider — Postmark, Mailgun, or SendGrid)
      responses:
        "200":
          description: Processed
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SuccessResponse" }

  /webhooks/inbound-sms:
    post:
      tags: [Webhooks & Cron]
      summary: Inbound SMS webhook (Twilio)
      description: |
        Receives inbound SMS messages from Twilio and:
        1. Looks up the client by sender phone number.
        2. Finds the most recent active flow execution for that client
           to determine the correct conversation_id.
        3. Creates an inbound `communications` record.
        4. Upserts the `conversation_thread` via DB trigger.
        5. Marks any active `reminder_flow_executions` waiting on this
           conversation as responded so the cron can advance the flow.

        Configure in Twilio Console → Phone Numbers → Active Numbers → Messaging:
          Webhook URL: `https://yourdomain.com/api/webhooks/inbound-sms`
          HTTP Method: `POST`

        Protected by optional `INBOUND_WEBHOOK_SECRET` header.
        Returns an empty TwiML `<Response>` so Twilio does not auto-reply.
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required: [Body, From, To, MessageSid]
              properties:
                Body:
                  type: string
                  description: SMS message text
                From:
                  type: string
                  description: Sender E.164 phone number (e.g. +15550001111)
                To:
                  type: string
                  description: Your Twilio number (e.g. +15559990000)
                MessageSid:
                  type: string
                  description: Twilio message SID
                AccountSid:
                  type: string
                  description: Twilio account SID
      responses:
        "200":
          description: Empty TwiML response
          content:
            text/xml:
              schema:
                type: string
                example: "<Response></Response>"

  /cron/poll-inbound-email:
    get:
      tags: [Webhooks & Cron]
      summary: Poll IMAP inbox for inbound emails (cron trigger)
      description: |
        Called by Vercel Cron or cPanel cron via curl.
        Polls the configured IMAP inbox, ingests new emails as conversation messages,
        and marks matching active reminder flow executions as responded.
      responses:
        "200":
          description: Poll complete
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SuccessResponse" }

  /cron/process-reminder-flows:
    get:
      tags: [Webhooks & Cron]
      summary: Process pending reminder flow executions (cron trigger)
      description: |
        Run every 5–15 minutes via cPanel cron:
        `curl -s "https://yourdomain.com/api/cron/process-reminder-flows?secret=CRON_SECRET"`

        Processes all pending flow execution steps and sends due messages.
      parameters:
        - in: query
          name: secret
          required: false
          schema: { type: string }
          description: Shared secret matching `CRON_SECRET` env var
      responses:
        "200":
          description: Processing complete
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SuccessResponse" }
