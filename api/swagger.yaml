openapi: 3.0.3
info:
  title: Encore Mortgage API
  description: |
    Full REST API for the Encore Mortgage platform.

    ## Authentication
    - **Broker/Admin routes** require `Authorization: Bearer <broker_session_token>`
    - **Client portal routes** require `Authorization: Bearer <client_session_token>`
    - **Public routes** require no authentication
    - **Webhook/Cron routes** are protected by shared secrets in query params or headers

    ## Base URL
    All endpoints are prefixed with `/api`.

    ## Email Delivery Notes
    - General outbound email uses `SMTP_*` environment variables.
    - Reminder flow email steps can use `REMINDER_SMTP_*` overrides when configured.
  version: "1.0.0"
  contact:
    name: Encore Mortgage Dev

servers:
  - url: /api
    description: Same-origin (development & production on port 8080)

tags:
  - name: Health
    description: System health checks
  - name: Admin Auth
    description: Broker / admin authentication (passwordless OTP)
  - name: Client Auth
    description: Client portal authentication (passwordless OTP)
  - name: Admin Bootstrap
    description: Session init and section controls
  - name: Bulk Import
    description: Platform-owner and mortgage-banker CSV bulk import (clients & realtors)
  - name: Admin Profile
    description: Authenticated broker's own profile management
  - name: Dashboard
    description: Overview stats and broker performance metrics
  - name: Loans
    description: Loan application management
  - name: Pre-Approval
    description: Pre-approval letter generation and delivery
  - name: Clients
    description: Client directory (admin view)
  - name: Voice
    description: Browser-based calling via Twilio Voice SDK
  - name: Brokers
    description: Broker / team member management
  - name: Tasks
    description: Task templates and loan-linked task instances
  - name: Documents
    description: Document uploads and management
  - name: Email Templates
    description: Email communication templates
  - name: SMS Templates
    description: SMS communication templates
  - name: WhatsApp Templates
    description: WhatsApp communication templates
  - name: Pipeline Step Templates
    description: Per-step communication templates for the pipeline
  - name: Conversations
    description: Inbound/outbound message threads
  - name: Audit Logs
    description: Activity history
  - name: Reports
    description: Analytics and reporting
  - name: Settings
    description: Tenant-level system settings
  - name: Reminder Flows
    description: Automated reminder sequences
  - name: Scheduler (Public)
    description: Public-facing booking endpoints
  - name: Scheduler (Admin)
    description: Admin scheduler settings and meeting management
  - name: Calendar
    description: Calendar events — birthdays, home/realtor anniversaries, important dates and reminders
  - name: Contact
    description: Public contact form submissions
  - name: Public
    description: Unauthenticated public endpoints
  - name: Webhooks & Cron
    description: Inbound webhooks and scheduled cron triggers
  - name: Billing
    description: Platform-owner billing config and usage meters (gated by billing_ui_enabled)

# ─── Security Schemes ─────────────────────────────────────────────────────────
components:
  securitySchemes:
    BrokerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Broker session token stored in `localStorage["broker_session"]`
    ClientAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Client session token stored in `localStorage["client_session_token"]`

  # ─── Reusable Schemas ───────────────────────────────────────────────────────
  schemas:
    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true

    EmailDraft:
      type: object
      properties:
        id: { type: integer }
        mailbox_id: { type: integer, nullable: true }
        subject: { type: string, nullable: true }
        body_html: { type: string, nullable: true }
        to_emails: { type: array, items: { type: object } }
        cc_emails: { type: array, items: { type: object } }
        bcc_emails: { type: array, items: { type: object } }
        reply_to_comm_id: { type: integer, nullable: true }
        conversation_id: { type: string, nullable: true }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    EmailSignature:
      type: object
      properties:
        id: { type: integer }
        name: { type: string }
        html: { type: string }
        is_default: { type: boolean }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    SchedulerBlockedRange:
      type: object
      properties:
        id: { type: integer }
        broker_id: { type: integer }
        start_datetime: { type: string, format: date-time }
        end_datetime: { type: string, format: date-time }
        label: { type: string, nullable: true }
        created_at: { type: string, format: date-time }

    ErrorResponse:
      type: object
      properties:
        success:
          type: boolean
          example: false
        error:
          type: string
          example: "Something went wrong"
        message:
          type: string

    BillingTeamNotice:
      type: object
      properties:
        show: { type: boolean }
        level:
          type: string
          nullable: true
          enum:
            - subscription_grace
            - subscription_restricted
            - subscription_suspended
            - quota_blocked
        headline: { type: string }
        detail: { type: string }
        blocksOutbound: { type: boolean }
        secondsUntilGraceEnd: { type: integer, nullable: true }

    BillingAccessState:
      type: object
      properties:
        level:
          type: string
          enum:
            - healthy
            - soft_warn
            - subscription_grace
            - quota_blocked
            - subscription_restricted
            - subscription_suspended
        blocksCostActions: { type: boolean }
        showsFullWall: { type: boolean }
        blocksBrokerSends: { type: boolean }
        graceEndsAt: { type: string, format: date-time, nullable: true }
        restrictedAt: { type: string, format: date-time, nullable: true }
        suspendedAt: { type: string, format: date-time, nullable: true }
        secondsUntilGraceEnd: { type: integer, nullable: true }
        headline: { type: string }
        detail: { type: string }
        suggestedPackId: { type: string, nullable: true }
        whatStillWorks:
          type: array
          items: { type: string }
        showWarnBanner: { type: boolean }

    QuotaUsageSlice:
      type: object
      properties:
        dimension:
          type: string
          enum: [sms_segments, voice_minutes, email_sends, scheduler_bookings, mortgi_ai_tokens]
        used: { type: integer }
        included: { type: integer }
        reserved: { type: integer }
        pct: { type: integer }

    UnifiedQuotaSummary:
      type: object
      properties:
        mode:
          type: string
          enum: [off, shadow, warn, enforce]
        periodStart: { type: string, format: date }
        sms_segments: { $ref: "#/components/schemas/QuotaUsageSlice" }
        voice_minutes: { $ref: "#/components/schemas/QuotaUsageSlice" }
        email_sends: { $ref: "#/components/schemas/QuotaUsageSlice" }
        scheduler_bookings: { $ref: "#/components/schemas/QuotaUsageSlice" }
        mortgi_ai_tokens: { $ref: "#/components/schemas/QuotaUsageSlice" }

    BillingDenialPayload:
      type: object
      description: Unified 402 response when quota or subscription blocks a cost action
      properties:
        success: { type: boolean }
        error: { type: string }
        message: { type: string }
        quota_exceeded: { type: boolean }
        billing_action_required: { type: boolean }
        billing_access_level: { type: string }
        suggested_pack_id: { type: string, nullable: true }
        quota:
          $ref: "#/components/schemas/UnifiedQuotaSummary"
        required_units: { type: integer }

    BrokerUser:
      type: object
      properties:
        id: { type: integer }
        email: { type: string, format: email }
        first_name: { type: string }
        last_name: { type: string }
        phone: { type: string, nullable: true }
        role:
          type: string
          enum: [admin, broker]
          description: "admin = Mortgage Banker, broker = Partner (Realtor)"
        tenant_id: { type: integer }
        status:
          type: string
          enum: [active, inactive, suspended]
        license_number: { type: string, nullable: true }
        specializations:
          type: array
          items: { type: string }
          nullable: true
        email_verified: { type: boolean }
        last_login: { type: string, format: date-time, nullable: true }
        public_token: { type: string, nullable: true }
        avatar_url: { type: string, nullable: true }
        bio: { type: string, nullable: true }
        office_address: { type: string, nullable: true }
        office_city: { type: string, nullable: true }
        office_state: { type: string, nullable: true }
        office_zip: { type: string, nullable: true }
        years_experience: { type: integer, nullable: true }
        total_loans_closed: { type: integer, nullable: true }

    ClientInfo:
      type: object
      properties:
        id: { type: integer }
        email: { type: string, format: email }
        first_name: { type: string }
        middle_name: { type: string, nullable: true }
        last_name: { type: string }
        phone: { type: string, nullable: true }
        date_of_birth: { type: string, format: date, nullable: true }
        address_street: { type: string, nullable: true }
        address_unit: { type: string, nullable: true }
        address_city: { type: string, nullable: true }
        address_state: { type: string, nullable: true }
        address_zip: { type: string, nullable: true }
        status: { type: string }
        created_at: { type: string, format: date-time }
        total_applications: { type: integer }
        active_applications: { type: integer }
        total_conversations: { type: integer }

    LoanApplication:
      type: object
      properties:
        id: { type: integer }
        application_number: { type: string }
        client_user_id: { type: integer }
        broker_user_id: { type: integer, nullable: true }
        partner_broker_id: { type: integer, nullable: true }
        loan_type: { type: string }
        loan_amount: { type: number }
        property_value: { type: number }
        property_address: { type: string, nullable: true }
        property_city: { type: string, nullable: true }
        property_state: { type: string, nullable: true }
        property_zip: { type: string, nullable: true }
        property_type: { type: string, nullable: true }
        down_payment: { type: number, nullable: true }
        loan_purpose: { type: string, nullable: true }
        status: { type: string }
        current_step: { type: integer }
        total_steps: { type: integer }
        priority: { type: string, nullable: true }
        estimated_close_date: { type: string, format: date, nullable: true }
        actual_close_date: { type: string, format: date, nullable: true }
        interest_rate: { type: number, nullable: true }
        loan_term_months: { type: integer, nullable: true }
        notes: { type: string, nullable: true }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    Task:
      type: object
      properties:
        id: { type: integer }
        title: { type: string }
        description: { type: string, nullable: true }
        status: { type: string }
        due_date: { type: string, format: date, nullable: true }
        loan_application_id: { type: integer, nullable: true }
        assigned_to: { type: integer, nullable: true }
        created_at: { type: string, format: date-time }

    AdminSectionControl:
      type: object
      properties:
        id: { type: integer }
        tenant_id: { type: integer }
        section_id:
          type: string
          description: Matches the sidebar menu item id
          example: "pipeline"
        is_disabled: { type: boolean }
        tooltip_message: { type: string, example: "Coming Soon" }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    ScheduledMeeting:
      type: object
      properties:
        id: { type: integer }
        broker_id: { type: integer }
        client_name: { type: string }
        client_email: { type: string, format: email }
        client_phone: { type: string, nullable: true }
        meeting_date: { type: string, format: date }
        meeting_time: { type: string, example: "14:00" }
        meeting_end_time: { type: string, example: "14:30" }
        meeting_type:
          type: string
          enum: [phone, video, teams, office]
        status:
          type: string
          enum: [confirmed, completed, cancelled, no_show]
        zoom_join_url: { type: string, nullable: true }
        zoom_start_url: { type: string, nullable: true }
        teams_meeting_id: { type: string, nullable: true }
        teams_join_url: { type: string, nullable: true }
        booking_token: { type: string }
        notes: { type: string, nullable: true }
        broker_notes: { type: string, nullable: true }
        created_at: { type: string, format: date-time }

    CalendarEvent:
      type: object
      properties:
        id: { type: integer }
        tenant_id: { type: integer }
        broker_id: { type: integer, nullable: true }
        event_type:
          type: string
          enum:
            [
              birthday,
              home_anniversary,
              realtor_anniversary,
              important_date,
              reminder,
              other,
            ]
        title: { type: string }
        description: { type: string, nullable: true }
        event_date: { type: string, format: date }
        event_time: { type: string, nullable: true, example: "10:00" }
        all_day: { type: boolean }
        recurrence:
          type: string
          enum: [none, yearly]
        color: { type: string, nullable: true }
        linked_client_id: { type: integer, nullable: true }
        linked_client_name: { type: string, nullable: true }
        linked_person_name: { type: string, nullable: true }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

# ─── Paths ────────────────────────────────────────────────────────────────────
paths:
  # ── Health ──────────────────────────────────────────────────────────────────
  /health:
    get:
      tags: [Health]
      summary: Health check
      description: Returns 200 with server status. Used by load balancers and uptime monitors.
      responses:
        "200":
          description: Server is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: ok }

  /ping:
    get:
      tags: [Health]
      summary: Ping
      description: Simple liveness ping.
      responses:
        "200":
          description: Pong
          content:
            application/json:
              schema:
                type: object
                properties:
                  message: { type: string, example: pong }

  # ── Admin Auth ───────────────────────────────────────────────────────────────
  /admin/auth/send-code:
    post:
      tags: [Admin Auth]
      summary: Send OTP to broker email or phone
      description: Sends a one-time 6-digit code via email or SMS. The broker must already exist in the `brokers` table.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string
                  format: email
                delivery_method:
                  type: string
                  enum: [email, sms]
                  default: email
      responses:
        "200":
          description: Code sent successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      message: { type: string }
        "400":
          description: Invalid email or broker not found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

  /admin/auth/verify-code:
    post:
      tags: [Admin Auth]
      summary: Verify OTP and create broker session
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, code]
              properties:
                email: { type: string, format: email }
                code:
                  type: string
                  description: 6-digit numeric code
                  example: "123456"
      responses:
        "200":
          description: Authenticated — returns session token and user
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      sessionToken: { type: string }
                      user: { $ref: "#/components/schemas/BrokerUser" }
        "401":
          description: Invalid or expired code
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

  /admin/auth/validate:
    get:
      tags: [Admin Auth]
      summary: Validate existing broker session
      description: Called on app boot to verify a stored token is still valid.
      security:
        - BrokerAuth: []
      responses:
        "200":
          description: Session valid
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      user: { $ref: "#/components/schemas/BrokerUser" }
        "401":
          description: Session invalid or expired
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

  /admin/auth/logout:
    post:
      tags: [Admin Auth]
      summary: Logout broker session
      security:
        - BrokerAuth: []
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SuccessResponse" }

  # ── Client Auth ──────────────────────────────────────────────────────────────
  /client/auth/send-code:
    post:
      tags: [Client Auth]
      summary: Send OTP to client email or phone
      description: |
        Sends a 6-digit OTP. If the email is not found in the `client_users` table,
        the response sets `shouldRedirectToWizard: true` and the UI redirects to `/wizard`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email: { type: string, format: email }
                delivery_method:
                  type: string
                  enum: [email, sms]
                  default: email
      responses:
        "200":
          description: Code sent or redirect flag set
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      shouldRedirectToWizard:
                        type: boolean
                        description: True when the email is not registered — redirect to onboarding wizard
        "400":
          description: Invalid request
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

  /client/auth/verify-code:
    post:
      tags: [Client Auth]
      summary: Verify OTP and create client session
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, code]
              properties:
                email: { type: string, format: email }
                code:
                  type: string
                  pattern: '^\d{6}$'
                  example: "489201"
      responses:
        "200":
          description: Authenticated — returns session token
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      sessionToken: { type: string }
                      client: { $ref: "#/components/schemas/ClientInfo" }
        "401":
          description: Invalid code
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

  /client/auth/validate:
    get:
      tags: [Client Auth]
      summary: Validate existing client session
      security:
        - ClientAuth: []
      responses:
        "200":
          description: Session valid
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      client: { $ref: "#/components/schemas/ClientInfo" }
        "401":
          description: Invalid or expired session
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

  /client/auth/logout:
    post:
      tags: [Client Auth]
      summary: Logout client session
      security:
        - ClientAuth: []
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SuccessResponse" }

  # ── Admin Bootstrap ──────────────────────────────────────────────────────────
  /admin/init:
    get:
      tags: [Admin Bootstrap]
      summary: Single bootstrap call on admin load
      description: |
        Validates session, returns broker profile + all section controls in a single request.
        Called by `initAdminSession()` thunk on every admin page mount.
      security:
        - BrokerAuth: []
      responses:
        "200":
          description: Bootstrap data
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      profile:
                        type: object
                        description: Broker profile details
                      controls:
                        type: array
                        items:
                          { $ref: "#/components/schemas/AdminSectionControl" }
                      rolePermissions:
                        type: array
                        items:
                          { $ref: "#/components/schemas/RoleSectionPermission" }
                      group_conversations_enabled:
                        type: boolean
                        description: >-
                          Group conversations enabled. Off when GROUP_CONVERSATIONS_ENABLED=0,
                          or on VERCEL_ENV=production unless GROUP_CONVERSATIONS_ALLOW_PRODUCTION=1.
                      bulk_csv_import_enabled:
                        type: boolean
                        description: >-
                          Bulk CSV import enabled. Off on VERCEL_ENV=production unless
                          BULK_CSV_IMPORT_ENABLED=1 or BULK_CSV_IMPORT_ALLOW_PRODUCTION=1.
        "401":
          description: Unauthorized
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

  /admin/bulk-import/templates/clients.csv:
    get:
      tags: [Bulk Import]
      summary: Download client CSV import template
      description: |
        Mortgage bankers (`admin`) and platform owners. Requires bulk import enabled
        (`BULK_CSV_IMPORT_ENABLED=1` or `BULK_CSV_IMPORT_ALLOW_PRODUCTION=1` in production).
      security:
        - BrokerAuth: []
      responses:
        "200":
          description: CSV template file
          content:
            text/csv:
              schema:
                type: string
        "403":
          description: Not a mortgage banker or platform owner
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
        "404":
          description: Feature disabled
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

  /admin/bulk-import/templates/realtors.csv:
    get:
      tags: [Bulk Import]
      summary: Download realtor/people CSV import template
      description: |
        Mortgage bankers may bulk-import realtor partners only (not other mortgage bankers).
        Platform owners may import any partner type.
      security:
        - BrokerAuth: []
      responses:
        "200":
          description: CSV template file
          content:
            text/csv:
              schema:
                type: string
        "403":
          description: Not a mortgage banker or platform owner
        "404":
          description: Feature disabled

  /admin/bulk-import/validate:
    post:
      tags: [Bulk Import]
      summary: Validate uploaded CSV (dry run)
      description: |
        Parses and validates CSV, runs DB duplicate preflight, stores a staging job.
        No records are created until commit. Mortgage bankers (`admin`) and platform owners.
        Mortgage bankers cannot bulk-create other mortgage bankers via realtor CSV.
      security:
        - BrokerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file, entity]
              properties:
                file:
                  type: string
                  format: binary
                entity:
                  type: string
                  enum: [clients, realtors]
      responses:
        "200":
          description: Validation preview
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  job_id:
                    type: integer
                  entity:
                    type: string
                    enum: [clients, realtors]
                  file_name:
                    type: string
                  row_count:
                    type: integer
                  will_create_count:
                    type: integer
                  skipped_count:
                    type: integer
                  error_count:
                    type: integer
                  preview_rows:
                    type: array
                    items:
                      type: object
                  breakdown:
                    type: object
                    additionalProperties:
                      type: integer
                  expires_at:
                    type: string
                    format: date-time
        "400":
          description: File or row validation error
        "403":
          description: Not a mortgage banker or platform owner
        "404":
          description: Feature disabled

  /admin/bulk-import/{jobId}:
    get:
      tags: [Bulk Import]
      summary: Get staging import job
      security:
        - BrokerAuth: []
      parameters:
        - name: jobId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Job details and preview
        "404":
          description: Job not found

  /admin/bulk-import/{jobId}/commit:
    post:
      tags: [Bulk Import]
      summary: Commit validated import job
      description: |
        Creates clients or brokers from staged preview rows. Importer owns created records
        (`assigned_broker_id` / `created_by_broker_id`). Mortgage bankers cannot commit
        rows that would create other mortgage bankers.
      security:
        - BrokerAuth: []
      parameters:
        - name: jobId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                link_phone_threads:
                  type: boolean
                  default: true
                send_welcome_emails:
                  type: boolean
                  default: false
      responses:
        "200":
          description: Import results
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  job_id:
                    type: integer
                  created_count:
                    type: integer
                  skipped_count:
                    type: integer
                  error_count:
                    type: integer
                  results:
                    type: array
                    items:
                      type: object
        "409":
          description: Job already committed
        "410":
          description: Job expired

  # ── Admin SMS Diagnostics ─────────────────────────────────────────────────────
  /admin/sms-check:
    get:
      tags: [Admin Bootstrap]
      summary: Look up a Twilio message SID for real-time delivery status
      description: |
        Superadmin-only endpoint. Fetches the message record directly from
        Twilio and returns the current delivery status, error codes, and the
        matching database row. Useful for diagnosing queued or undelivered SMS
        without waiting for the status callback webhook.
      security:
        - BrokerAuth: []
      parameters:
        - in: query
          name: sid
          required: true
          schema: { type: string, example: "SM6dd1ecd44a371ebc14f15f3d2e13a263" }
          description: The Twilio message SID to look up
      responses:
        "200":
          description: Twilio and DB record for the given SID
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  twilio:
                    type: object
                    properties:
                      sid: { type: string }
                      status: { type: string, enum: [queued, sending, sent, delivered, undelivered, failed, read] }
                      errorCode: { type: integer, nullable: true }
                      errorMessage: { type: string, nullable: true }
                      from: { type: string }
                      to: { type: string }
                      body: { type: string }
                      dateSent: { type: string, format: date-time, nullable: true }
                      dateUpdated: { type: string, format: date-time }
                      price: { type: string, nullable: true }
                      priceUnit: { type: string, nullable: true }
                      direction: { type: string }
                      numSegments: { type: string }
                  db:
                    type: object
                    nullable: true
                    description: Matching communications row from the database
        "400": { description: Missing sid parameter }
        "403": { description: Superadmin role required }
        "503": { description: Twilio not configured }

  /admin/section-controls:
    get:
      tags: [Admin Bootstrap]
      summary: Get all section controls for the tenant
      security:
        - BrokerAuth: []
      responses:
        "200":
          description: Section controls list
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      controls:
                        type: array
                        items:
                          { $ref: "#/components/schemas/AdminSectionControl" }
    put:
      tags: [Admin Bootstrap]
      summary: Bulk update section controls
      description: Enable or disable sidebar sections and set tooltip messages.
      security:
        - BrokerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [controls]
              properties:
                controls:
                  type: array
                  items:
                    type: object
                    required: [section_id, is_disabled]
                    properties:
                      section_id: { type: string, example: "pipeline" }
                      is_disabled: { type: boolean }
                      tooltip_message: { type: string, example: "Coming Soon" }
      responses:
        "200":
          description: Updated successfully
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SuccessResponse" }

