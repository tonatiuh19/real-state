      security:
        - BrokerAuth: []
      parameters:
        - in: path
          name: loanId
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [partner_broker_id]
              properties:
                partner_broker_id: { type: integer, nullable: true }
      responses:
        "200":
          description: Partner assigned
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SuccessResponse" }

  /loans/{loanId}/status:
    patch:
      tags: [Loans]
      summary: Update loan status
      security:
        - BrokerAuth: []
      parameters:
        - in: path
          name: loanId
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties:
                status: { type: string }
                notes: { type: string }
      responses:
        "200":
          description: Status updated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SuccessResponse" }

  /loans/{loanId}/source:
    patch:
      tags: [Loans]
      summary: Update loan lead source category
      security:
        - BrokerAuth: []
      parameters:
        - in: path
          name: loanId
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [source_category]
              properties:
                source_category:
                  type: string
                  nullable: true
                  enum:
                    - current_client_referral
                    - past_client
                    - past_client_referral
                    - personal_friend
                    - realtor
                    - advertisement
                    - business_partner
                    - builder
                    - other
      responses:
        "200":
          description: Source category updated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SuccessResponse" }

  /loans/{loanId}/details:
    patch:
      tags: [Loans]
      summary: Update editable loan application fields
      description: >
        Updates one or more loan detail fields (financial, property, terms,
        applicant, notes). Accessible to the assigned broker, partner broker,
        admin, or superadmin.
      security:
        - BrokerAuth: []
      parameters:
        - in: path
          name: loanId
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                loan_type:
                  type: string
                  enum: [purchase, refinance]
                loan_amount:
                  type: number
                  nullable: true
                property_value:
                  type: number
                  nullable: true
                property_address:
                  type: string
                  nullable: true
                property_city:
                  type: string
                  nullable: true
                property_state:
                  type: string
                  nullable: true
                property_zip:
                  type: string
                  nullable: true
                property_type:
                  type: string
                  nullable: true
                  enum:
                    [
                      single_family,
                      condo,
                      multi_family,
                      commercial,
                      land,
                      other,
                    ]
                down_payment:
                  type: number
                  nullable: true
                loan_purpose:
                  type: string
                  nullable: true
                estimated_close_date:
                  type: string
                  format: date
                  nullable: true
                interest_rate:
                  type: number
                  nullable: true
                loan_term_months:
                  type: integer
                  nullable: true
                priority:
                  type: string
                  enum: [low, medium, high, urgent]
                  nullable: true
                notes:
                  type: string
                  nullable: true
                citizenship_status:
                  type: string
                  nullable: true
                  enum: [us_citizen, permanent_resident, non_resident, other]
                employment_status:
                  type: string
                  nullable: true
                  enum:
                    [
                      employed,
                      self_employed,
                      unemployed,
                      retired,
                      retired_with_pension,
                    ]
                employer_name:
                  type: string
                  nullable: true
                years_employed:
                  type: string
                  nullable: true
      responses:
        "200":
          description: Loan details updated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SuccessResponse" }
        "400":
          description: Validation error or no fields provided
        "403":
          description: Access denied
        "404":
          description: Loan not found

  /loans/{loanId}/export-mismo:
    get:
      tags: [Loans]
      summary: Export loan as MISMO 3.4 XML
      security:
        - BrokerAuth: []
      parameters:
        - in: path
          name: loanId
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: MISMO XML file
          content:
            application/xml:
              schema:
                type: string

